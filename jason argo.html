        // ── Fase enemiga ──
        function startEnemyPhase() {
            combatPhase = "enemy";
            updateRoundDisplay();
            showFeedback("⚔ Turno Enemigo", "#f87171");
            enemiesActed.clear();

            // Pequeño delay antes de que actúen los enemigos
            setTimeout(() => runNextEnemyTurn(), 900);
        }

        function runNextEnemyTurn() {
            const alive = getAliveEnemies().filter(p => !enemiesActed.has(p.id));
            if (alive.length === 0) {
                setTimeout(() => startHeroPhase(), 600);
                return;
            }

            const enemyPedestal = alive[Math.floor(Math.random() * alive.length)];
            const skill = GUARD_SKILLS_LIST[0];

            // Respetar provocación: si tauntTargetId apunta a un héroe vivo, atacarlo siempre
            let heroTargets = getAliveHeroes();
            if (heroTargets.length === 0) {
                setTimeout(() => showDefeat(), 500);
                return;
            }

            let target;
            if (tauntTargetId !== null && tauntTurnsLeft > 0) {
                const taunter = heroTargets.find(p => p.id === tauntTargetId);
                target = taunter || heroTargets[Math.floor(Math.random() * heroTargets.length)];
            } else {
                target = heroTargets[Math.floor(Math.random() * heroTargets.length)];
            }

            performCombatAction(enemyPedestal, target, skill, () => {
                enemiesActed.add(enemyPedestal.id);
                setTimeout(() => runNextEnemyTurn(), 1200);
            });
        }

        function startHeroPhase() {
            currentRound++;
            combatPhase = "hero";
            heroesActed.clear();
            enemiesActed.clear();

            // Decrementar provocación
            if (tauntTargetId !== null) {
                tauntTurnsLeft--;
                if (tauntTurnsLeft <= 0) {
                    tauntTargetId  = null;
                    tauntTurnsLeft = 0;
                }
            }

            // Procesar efectos y regen para todos los personajes
            pedestals.forEach(p => {
                if (!isAlive(p.id)) return;
                processEffects(p.id);
                const cd = CHARACTER_DATA[p.name];
                if (cd && cd.team === "heroes") {
                    cd.energy = Math.min(cd.maxEnergy, cd.energy + cd.energyRegen);
                }
                updateBarSprite(p.id);
            });

            restoreGlowRings();
            updateRoundDisplay();
            showFeedback(`🌅 Ronda ${currentRound} — Tu turno`, "#4ade80");

            // Verificar si quedan enemigos
            if (getAliveEnemies().length === 0) {
                setTimeout(() => showVictory(), 500);
                return;
            }
        }

        // ================================================================
        //  ANIMACIÓN DE COMBATE — performCombatAction
        // ================================================================

        function performCombatAction(attPedestal, defPedestal, skill, onDone) {
            if (actionInProgress) return;
            actionInProgress = true;

            const stage = pedestals[ACTION_STAGE_ID];
            const char  = attPedestal.character;
            if (!char) { actionInProgress = false; if (onDone) onDone(); return; }

            const originPos = new THREE.Vector3(...attPedestal.pos);
            const stagePos  = new THREE.Vector3(...stage.pos);

            // Sacar del grupo origen
            attPedestal.group.localToWorld(char.position);
            attPedestal.group.remove(char);
            scene.add(char);

            tweenMove(char.position, stagePos, 0.7, 5, () => {
                // En escena: aplicar daño
                scene.remove(char);
                stage.group.add(char);
                char.position.set(0, 0.65, 0);

                // Aplicar habilidad
                if (skill.type === "individual" || skill.type === "aoe") {
                    const targets = skill.aoe ? getAliveEnemies().filter(p => CHARACTER_DATA[p.name] && CHARACTER_DATA[p.name].team !== CHARACTER_DATA[attPedestal.name].team)
                                              : [defPedestal];
                    // Para enemigos atacando héroes, ajustar targets
                    const attCd = CHARACTER_DATA[attPedestal.name];
                    const finalTargets = skill.aoe
                        ? pedestals.filter(p => { const cd = CHARACTER_DATA[p.name]; return cd && cd.team !== attCd.team && cd.hp > 0; })
                        : [defPedestal];

                    finalTargets.forEach(tp => {
                        const defCd = CHARACTER_DATA[tp.name];
                        if (!defCd || defCd.hp <= 0) return;
                        const { defMult } = getEffectiveMultipliers(tp.id);
                        const { atkMult } = getEffectiveMultipliers(attPedestal.id);
                        const modAtk = { ...attCd, atk: attCd.atk * atkMult };
                        const result = resolveAttack(modAtk, defCd, skill.mult || 1.0, skill.guaranteedCrit || false, defMult);
                        if (result.hit) {
                            defCd.hp = Math.max(0, defCd.hp - result.damage);
                            updateBarSprite(tp.id);
                            if (tp.id === activeHeroPedestalId) selectPedestalRaw(tp.id);
                        }
                        showFeedback(result.label, result.color, result.crit);
                        if (defCd.hp <= 0) killCharacter(tp.id);
                    });
                } else if (skill.effect) {
                    skill.effect(CHARACTER_DATA[attPedestal.name], attPedestal.id);
                }

                // Volver al origen
                setTimeout(() => {
                    stage.group.localToWorld(char.position);
                    stage.group.remove(char);
                    scene.add(char);

                    tweenMove(char.position, originPos, 0.7, 5, () => {
                        scene.remove(char);
                        attPedestal.group.add(char);
                        char.position.set(0, 0.65, 0);
                        actionInProgress = false;
                        if (onDone) onDone();
                    });
                }, 900);
            });
        }

        // ================================================================
        //  SELECCIÓN DE OBJETIVO PARA HABILIDADES INDIVIDUALES
        // ================================================================

        function enterTargetSelectMode(skill, attCd, attPedestal) {
            selectingTarget = true;
            pendingSkill = { skill, attCd, attPedestal };
            showFeedback("🎯 Elige un objetivo enemigo", "#fcd34d");
            // Resaltar enemigos
            getAliveEnemies().forEach(p => {
                const ring = p.group && p.group.children[2];
                if (ring) { ring.material.color.setHex(0xff2020); ring.material.opacity = 1.0; }
            });
            hideActionPanel();
        }

        function cancelTargetSelect() {
            selectingTarget = false;
            pendingSkill = null;
            restoreGlowRings();
            pedestals.forEach(p => {
                const ring = p.group && p.group.children[2];
                if (ring) ring.material.color.setHex(
                    p.type==="right" ? 0xec4899 : p.type==="center" ? 0xf59e0b : 0x00ffff
                );
            });
        }

        function confirmTargetAndAttack(targetPedestalId) {
            if (!pendingSkill) return;
            const { skill, attCd, attPedestal } = pendingSkill;
            const targetPedestal = pedestals[targetPedestalId];
            cancelTargetSelect();

            // Descontar energía
            if (skill.cost > 0) {
                attCd.energy = Math.max(0, attCd.energy - skill.cost);
                updateBarSprite(attPedestal.id);
            }

            performCombatAction(attPedestal, targetPedestal, skill, () => {
                markHeroActed(attPedestal.id);
                selectPedestalRaw(attPedestal.id);
            });
        }

        // ================================================================
        //  PANEL DE ACCIÓN
        // ================================================================

        function showActionPanel(pedestalId) {
            const p = pedestals[pedestalId];
            const cd = CHARACTER_DATA[p.name];
            if (!cd || cd.team !== "heroes" || cd.hp <= 0) { hideActionPanel(); return; }
            // Solo si es turno del jugador y el héroe no ha actuado
            if (combatPhase !== "hero" || heroesActed.has(pedestalId)) { hideActionPanel(); return; }
            activeHeroPedestalId = pedestalId;
            openSubmenu = null;

            document.getElementById("action-panel").classList.add("visible");
            document.getElementById("action-submenu").classList.remove("visible");
            document.querySelectorAll(".act-btn").forEach(b => b.classList.remove("active"));
        }

        function hideActionPanel() {
            document.getElementById("action-panel").classList.remove("visible");
            document.getElementById("action-submenu").classList.remove("visible");
            openSubmenu = null;
            activeHeroPedestalId = null;
        }

        function toggleSubmenu(type) {
            const sub = document.getElementById("action-submenu");
            const content = document.getElementById("submenu-content");
            const title   = document.getElementById("submenu-title");

            if (openSubmenu === type) {
                sub.classList.remove("visible");
                openSubmenu = null;
                document.querySelectorAll(".act-btn").forEach(b => b.classList.remove("active"));
                return;
            }

            openSubmenu = type;
            document.querySelectorAll(".act-btn").forEach(b => b.classList.remove("active"));
            if (type === "skills") document.querySelector(".skills-btn").classList.add("active");
            if (type === "items")  document.querySelector(".items-btn").classList.add("active");

            if (type === "skills") {
                title.textContent = "⚔️  Habilidades";
                renderSkillsMenu(content);
            } else {
                title.textContent = "🎒  Ítems";
                content.innerHTML = `<div class="items-empty">— Inventario vacío —<br><span style="font-size:0.6rem;color:#1e293b">Los ítems se obtendrán durante la aventura</span></div>`;
            }
            sub.classList.add("visible");
        }

        function renderSkillsMenu(container) {
            if (activeHeroPedestalId === null) return;
            const p  = pedestals[activeHeroPedestalId];
            const cd = CHARACTER_DATA[p.name];
            const skills = SKILLS[p.name] || [];

            container.innerHTML = "";
            const grid = document.createElement("div");
            grid.className = "skills-grid";

            skills.forEach((sk, idx) => {
                const hasEnergy = cd.energy >= sk.cost;
                const btn = document.createElement("div");
                btn.className = "skill-btn" + (sk.supreme?" supreme":"") + (!hasEnergy?" no-energy":"");

                // Preview de daño para habilidades de ataque
                let previewLine = "";
                if (sk.mult !== undefined) {
                    const genericDef = { def:30, evasion:0.08 };
                    const baseDmg = Math.max(1, (cd.atk * sk.mult) - (genericDef.def * 0.4));
                    const critDmg = Math.round(baseDmg * cd.critMult);
                    const normalDmg = Math.round(baseDmg);
                    const hitPct = Math.round((cd.precision - genericDef.evasion) * 100);
                    previewLine = `<span style="color:#f87171">⚔ ${normalDmg}</span>`
                                + `  <span style="color:#fbbf24">💥 ${critDmg} (${Math.round(cd.critChance*100)}%)</span>`
                                + `  <span style="color:#64748b">Acierto ${hitPct}%</span>`;
                }

                btn.innerHTML = `
                    <div class="skill-icon" style="background:${sk.iconBg};">${sk.icon}</div>
                    <div class="skill-name">H${idx+1} ${sk.name}</div>
                    <div class="skill-cost ${sk.cost===0?'free':''}">${sk.cost===0?'Gratis':'⚡ '+sk.cost}</div>
                    <div class="skill-type-badge">${sk.type}</div>
                    <div class="skill-tooltip">
                        <b>${sk.name}</b>${sk.desc}
                        ${previewLine?`<div style="margin-top:7px;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;line-height:1.8;">${previewLine}</div>`:""}
                        ${!hasEnergy?`<div style="color:#f87171;margin-top:5px;">Sin energía (${cd.energy}/${sk.cost})</div>`:""}
                    </div>
                `;

                if (hasEnergy) {
                    btn.onclick = () => executeSkill(sk, cd, p);
                }
                grid.appendChild(btn);
            });
            container.appendChild(grid);
        }

        function executeSkill(skill, cd, pedestal) {
            document.getElementById("action-submenu").classList.remove("visible");
            openSubmenu = null;
            document.querySelectorAll(".act-btn").forEach(b => b.classList.remove("active"));

            // Habilidades de área o soporte: ejecutar directamente
            if (skill.type === "aoe" || skill.type === "soporte_area" || skill.type === "soporte_self") {
                if (skill.cost > 0) {
                    cd.energy = Math.max(0, cd.energy - skill.cost);
                    updateBarSprite(pedestal.id);
                }
                if (skill.effect) {
                    skill.effect(cd, pedestal.id);
                } else if (skill.type === "aoe") {
                    // Daño de área: animar al escenario y dañar a todos los enemigos
                    performCombatAction(pedestal, null, skill, () => {
                        markHeroActed(pedestal.id);
                        selectPedestalRaw(pedestal.id);
                    });
                    return;
                }
                markHeroActed(pedestal.id);
                selectPedestalRaw(pedestal.id);
                return;
            }

            // Habilidad individual: entrar en modo selección de objetivo
            enterTargetSelectMode(skill, cd, pedestal);
        }

        function doDefend() {
            if (activeHeroPedestalId === null) return;
            const p = pedestals[activeHeroPedestalId];
            const cd = CHARACTER_DATA[p.name];
            if (!cd) return;

            // DEF ×1.5 este turno + regen doble de energía
            applyEffect(p.id, {type:"def_up", def_mult:1.50, duration:1});
            cd.energy = Math.min(cd.maxEnergy, cd.energy + cd.energyRegen * 2);
            updateBarSprite(p.id);
            showFeedback(`🛡️ ${cd.charName} se defiende — DEF ×1.5`, "#4ade80");

            document.getElementById("action-submenu").classList.remove("visible");
            openSubmenu = null;
            document.querySelectorAll(".act-btn").forEach(b => b.classList.remove("active"));

            markHeroActed(p.id);
            selectPedestalRaw(p.id);
        }

        // ================================================================
        //  FEEDBACK VISUAL
        // ================================================================

        function showFeedback(text, color, big) {
            const el = document.getElementById("action-feedback");
            el.textContent = text;
            el.style.color  = color || "#fcd34d";
            el.style.fontSize = big ? "2rem" : "1.4rem";
            el.classList.add("show");
            setTimeout(() => el.classList.remove("show"), 2000);
        }

        // ================================================================
        //  ACTUALIZAR BARRAS FLOTANTES
        // ================================================================

        function updateBarSprite(pedestalId) {
            const bs = barSprites[pedestalId];
            if (!bs) return;
            bs.draw();
            bs.tex.needsUpdate = true;
        }

        // ================================================================
        //  INTEGRACIÓN CON selectPedestal (sobrescritura)
        // ================================================================

        // Versión interna sin lógica de combate (para llamadas internas)
        function selectPedestalRaw(id) {
            selectedPedestalId = id;
            const p  = pedestals[id];
            const cd = CHARACTER_DATA[p.name];

            // HUD lateral
            const hud = document.getElementById("hud-panel");
            if (cd && hud) {
                hud.classList.add("visible");
                const teamColors = { heroes:"#60a0f0", guards:"#f06060" };
                document.getElementById("hud-name").textContent     = cd.charName;
                document.getElementById("hud-name").style.color     = teamColors[cd.team] || "#fff";
                const hpPct = (cd.hp / cd.maxHp * 100).toFixed(0);
                document.getElementById("hud-hp-fill").style.width  = hpPct + "%";
                document.getElementById("hud-hp-val").textContent   = `${cd.hp} / ${cd.maxHp}`;
                const energyBlock = document.getElementById("hud-energy-block");
                if (energyBlock) energyBlock.style.display = cd.maxEnergy > 0 ? "" : "none";
                if (cd.maxEnergy > 0) {
                    const enPct = (cd.energy / cd.maxEnergy * 100).toFixed(0);
                    document.getElementById("hud-en-fill").style.width = enPct + "%";
                    document.getElementById("hud-en-val").textContent  = `${cd.energy} / ${cd.maxEnergy}`;
                }
                const statsExtra = document.getElementById("hud-stats-extra");
                if (statsExtra) statsExtra.textContent = `ATK ${cd.atk}  •  DEF ${cd.def}  •  EVA ${Math.round(cd.evasion*100)}%`;
                document.getElementById("hud-role").textContent = `Rol: ${cd.role}  •  Equipo: ${cd.team}`;
            }

            // Enfocar cámara
            if (controls) {
                controls.target.set(p.pos[0], p.pos[1]+2, p.pos[2]);
                controls.update();
            }
        }

        // Sobrescribir selectPedestal existente para incluir lógica de combate
        const _origSelectPedestal = selectPedestal;
        selectPedestal = function(id) {
            // Si estamos en modo selección de objetivo
            if (selectingTarget) {
                const p  = pedestals[id];
                const cd = CHARACTER_DATA[p.name];
                // Solo aceptar enemigos vivos como objetivo
                if (cd && cd.team === "guards" && cd.hp > 0) {
                    confirmTargetAndAttack(id);
                } else {
                    showFeedback("Selecciona un enemigo válido", "#f87171");
                }
                return;
            }

            _origSelectPedestal(id);
            showActionPanel(id);
        };

        // ── Crear HUD de ronda en el UI overlay ──
        (function createRoundHUD() {
            const header = document.getElementById("ui-header");
            if (!header) return;
            const roundBox = document.createElement("div");
            roundBox.className = "glass";
            roundBox.style.cssText = "padding:8px 18px;margin-right:12px;display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;";
            roundBox.innerHTML = `
                <div id="round-display" style="font-size:0.85rem;font-weight:700;color:#fcd34d;letter-spacing:0.1em;">Ronda 1</div>
                <div id="round-phase"   style="font-size:0.65rem;color:#4ade80;letter-spacing:0.08em;">⚔ Tu turno</div>
            `;
            header.insertBefore(roundBox, header.firstChild);
        })();

        // ================================================================
        //  MONEDAS — calcular recompensa
        // ================================================================

        function calcReward(skipped) {
            if (skipped) {
                // Saltar batalla: recompensa reducida (50–70%)
                const base = Math.floor(Math.random() * 40) + 60; // 60–99
                return Math.floor(base * 0.6);
            }
            // Victoria normal: basada en rondas (menos rondas = más monedas)
            const base = 120;
            const bonus = Math.max(0, (8 - currentRound) * 8);
            return base + bonus + Math.floor(Math.random() * 30);
        }

        // ================================================================
        //  PANTALLAS DE RESULTADO
        // ================================================================

        function lockBattle() {
            // Congelar toda interacción de combate
            combatPhase = "ended";
            hideActionPanel();
        }

        function showVictory(skipped) {
            lockBattle();
            const coins = calcReward(skipped);
            const overlay = document.getElementById("result-overlay");
            const box     = document.getElementById("result-box");

            box.innerHTML = `
                <div style="font-size:3.5rem;margin-bottom:4px;">🏆</div>
                <div style="font-size:1.8rem;font-weight:900;letter-spacing:0.12em;color:#fcd34d;text-transform:uppercase;margin-bottom:6px;">
                    ${skipped ? "Batalla Saltada" : "¡Victoria!"}
                </div>
                <div style="font-size:0.85rem;color:#94a3b8;margin-bottom:20px;">
                    ${skipped ? "Recibiste una recompensa reducida por saltar." : `Completada en ${currentRound} ronda${currentRound !== 1 ? "s" : ""}.`}
                </div>
                <div style="display:flex;align-items:center;justify-content:center;gap:10px;
                            background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);
                            border-radius:14px;padding:14px 28px;margin-bottom:28px;">
                    <span style="font-size:2rem;">🪙</span>
                    <div>
                        <div style="font-size:2rem;font-weight:900;color:#fcd34d;line-height:1;">${coins}</div>
                        <div style="font-size:0.65rem;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;">Monedas de Plata</div>
                    </div>
                </div>
                <button onclick="document.getElementById('result-overlay').style.display='none'"
                    style="background:linear-gradient(135deg,rgba(245,158,11,0.3),rgba(245,158,11,0.15));
                           border:1px solid rgba(245,158,11,0.6);color:#fcd34d;
                           font-size:0.85rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
                           padding:12px 36px;border-radius:50px;cursor:pointer;
                           backdrop-filter:blur(10px);transition:all 0.2s;"
                    onmouseover="this.style.boxShadow='0 0 24px rgba(245,158,11,0.5)'"
                    onmouseout="this.style.boxShadow='none'">
                    Continuar →
                </button>
                <div style="margin-top:16px;">
                    <button onclick="document.getElementById('result-overlay').style.display='none'"
                        style="background:transparent;border:none;color:#475569;font-size:0.7rem;
                               cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;">
                        Menú Principal
                    </button>
                </div>
            `;
            overlay.style.display = "flex";
        }

        function showDefeat() {
            lockBattle();
            const overlay = document.getElementById("result-overlay");
            const box     = document.getElementById("result-box");

            box.innerHTML = `
                <div style="font-size:3.5rem;margin-bottom:4px;">💀</div>
                <div style="font-size:1.8rem;font-weight:900;letter-spacing:0.12em;color:#f87171;text-transform:uppercase;margin-bottom:6px;">
                    Derrota
                </div>
                <div style="font-size:0.85rem;color:#94a3b8;margin-bottom:28px;">
                    Tu equipo ha caído en la batalla.
                </div>
                <button onclick="location.reload()"
                    style="background:linear-gradient(135deg,rgba(248,113,113,0.25),rgba(248,113,113,0.1));
                           border:1px solid rgba(248,113,113,0.5);color:#fca5a5;
                           font-size:0.85rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
                           padding:12px 36px;border-radius:50px;cursor:pointer;
                           backdrop-filter:blur(10px);margin-bottom:12px;transition:all 0.2s;display:block;width:100%;"
                    onmouseover="this.style.boxShadow='0 0 24px rgba(248,113,113,0.4)'"
                    onmouseout="this.style.boxShadow='none'">
                    🔄 Reintentar
                </button>
                <button onclick="document.getElementById('result-overlay').style.display='none'"
                    style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:#475569;
                           font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
                           padding:10px 28px;border-radius:50px;cursor:pointer;display:block;width:100%;">
                    Menú Principal
                </button>
            `;
            overlay.style.display = "flex";
        }

        // ================================================================
        //  SALTAR BATALLA
        // ================================================================

        function skipBattlePrompt() {
            document.getElementById("skip-confirm").style.display = "flex";
        }

        function skipBattleConfirm(yes) {
            document.getElementById("skip-confirm").style.display = "none";
            if (yes) showVictory(true);
        }

        // ── Inyectar DOM: overlay resultado + diálogo saltar + botón ──
        (function injectBattleUI() {

            // Overlay de resultado (victoria / derrota)
            const overlay = document.createElement("div");
            overlay.id = "result-overlay";
            overlay.style.cssText = `
                display:none;position:fixed;inset:0;z-index:200;
                align-items:center;justify-content:center;
                background:rgba(2,6,23,0.88);backdrop-filter:blur(8px);
            `;
            overlay.innerHTML = `<div id="result-box" style="
                background:rgba(10,18,36,0.97);
                border:1px solid rgba(255,255,255,0.1);
                border-radius:24px;padding:40px 48px;
                text-align:center;max-width:380px;width:90%;
                box-shadow:0 0 60px rgba(0,0,0,0.8);
                font-family:'Segoe UI',sans-serif;color:#f1f5f9;
            "></div>`;
            document.body.appendChild(overlay);

            // Diálogo de confirmación "saltar batalla"
            const skipDlg = document.createElement("div");
            skipDlg.id = "skip-confirm";
            skipDlg.style.cssText = `
                display:none;position:fixed;inset:0;z-index:210;
                align-items:center;justify-content:center;
                background:rgba(2,6,23,0.80);backdrop-filter:blur(6px);
            `;
            skipDlg.innerHTML = `
                <div style="background:rgba(10,18,36,0.98);border:1px solid rgba(255,255,255,0.12);
                            border-radius:20px;padding:32px 40px;text-align:center;max-width:340px;width:90%;
                            font-family:'Segoe UI',sans-serif;color:#f1f5f9;box-shadow:0 0 50px rgba(0,0,0,0.7);">
                    <div style="font-size:2rem;margin-bottom:10px;">⚡</div>
                    <div style="font-size:1.1rem;font-weight:800;letter-spacing:0.08em;color:#fcd34d;
                                text-transform:uppercase;margin-bottom:8px;">¿Saltar Batalla?</div>
                    <div style="font-size:0.8rem;color:#94a3b8;margin-bottom:24px;line-height:1.6;">
                        Recibirás una recompensa reducida<br>en monedas de plata.
                    </div>
                    <div style="display:flex;gap:12px;justify-content:center;">
                        <button onclick="skipBattleConfirm(true)"
                            style="background:linear-gradient(135deg,rgba(245,158,11,0.3),rgba(245,158,11,0.12));
                                   border:1px solid rgba(245,158,11,0.5);color:#fcd34d;
                                   font-size:0.8rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
                                   padding:10px 28px;border-radius:50px;cursor:pointer;transition:all 0.2s;"
                            onmouseover="this.style.boxShadow='0 0 18px rgba(245,158,11,0.4)'"
                            onmouseout="this.style.boxShadow='none'">
                            Sí, saltar
                        </button>
                        <button onclick="skipBattleConfirm(false)"
                            style="background:transparent;border:1px solid rgba(255,255,255,0.15);color:#94a3b8;
                                   font-size:0.8rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
                                   padding:10px 28px;border-radius:50px;cursor:pointer;transition:all 0.2s;"
                            onmouseover="this.style.style='border-color:rgba(255,255,255,0.35)'"
                            onmouseout="">
                            No, continuar
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(skipDlg);

            // Botón "Saltar Batalla" — arriba a la izquierda
            const skipBtn = document.createElement("button");
            skipBtn.textContent = "⚡ Saltar Batalla";
            skipBtn.onclick = skipBattlePrompt;
            skipBtn.style.cssText = `
                position:fixed;top:20px;left:20px;z-index:30;
                background:rgba(10,18,36,0.8);backdrop-filter:blur(10px);
                border:1px solid rgba(255,255,255,0.12);color:#94a3b8;
                font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
                padding:8px 18px;border-radius:50px;cursor:pointer;
                transition:all 0.2s;pointer-events:auto;
            `;
            skipBtn.onmouseover = () => { skipBtn.style.borderColor="rgba(245,158,11,0.5)"; skipBtn.style.color="#fcd34d"; };
            skipBtn.onmouseout  = () => { skipBtn.style.borderColor="rgba(255,255,255,0.12)"; skipBtn.style.color="#94a3b8"; };
            document.body.appendChild(skipBtn);
        })();

    </script>
</body>
</html>
