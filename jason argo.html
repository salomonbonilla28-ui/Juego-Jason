<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Griego Antiguo 3D - Explorador Interactivo</title>
    <!-- Three.js Principal -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Controles de Órbita de Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Cargador de archivos GLTF/GLB -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- Cargador FBX (Mixamo) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050b14;
            color: #f1f5f9;
        }
        canvas { display: block; }

        #canvas-container {
            position: absolute; inset: 0; z-index: 0;
            width: 100%; height: 100vh;
        }

        /* Loader */
        #loader {
            position: absolute; inset: 0; z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #020617;
            transition: opacity 0.7s;
            pointer-events: none;
        }
        .loader-ring {
            position: relative; width: 96px; height: 96px; margin-bottom: 24px;
        }
        .loader-ring-bg {
            position: absolute; inset: 0;
            border: 4px solid rgba(245,158,11,0.2);
            border-radius: 50%;
        }
        .loader-ring-spin {
            position: absolute; inset: 0;
            border: 4px solid transparent;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader h1 {
            font-size: 1.5rem; font-weight: 700; letter-spacing: 0.15em;
            text-transform: uppercase; color: #fef3c7; margin-bottom: 8px;
        }
        #loader p {
            color: #94a3b8; font-size: 0.875rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* UI overlay */
        #ui-overlay {
            position: absolute; inset: 0; z-index: 10;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Glass card */
        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }
        .active-ring {
            box-shadow: 0 0 15px rgba(245,158,11,0.6);
            border-color: rgba(245,158,11,0.8);
        }

        /* Header */
        #ui-header {
            display: flex;
            justify-content: flex-end;
        }

        /* Ciclo de luz panel */
        #time-panel {
            pointer-events: auto;
            display: flex; align-items: center; gap: 16px;
            padding: 10px 16px;
        }
        #time-label-group { text-align: right; }
        #time-label-group .label-top {
            font-size: 0.7rem; color: #94a3b8;
        }
        #time-display {
            font-size: 0.875rem; font-weight: 600; color: #fcd34d;
        }
        #time-buttons {
            display: flex; gap: 2px;
            background: rgba(15,23,42,0.6);
            border: 1px solid rgba(51,65,85,0.5);
            border-radius: 12px;
            padding: 4px;
        }
        #time-buttons button {
            padding: 8px;
            border: none; background: transparent; cursor: pointer;
            border-radius: 8px;
            color: #94a3b8;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        #time-buttons button:hover {
            background: rgba(245,158,11,0.2);
            color: #fcd34d;
        }
        #time-buttons button.active {
            background: rgba(245,158,11,0.3);
            color: #fcd34d;
        }
        #time-buttons button svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        /* Panel lateral HUD */
        #hud-panel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 20;
            width: 220px;
            display: none;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        #hud-panel.visible { display: flex; }
        .hud-card {
            background: rgba(10, 15, 30, 0.88);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
        }
        .hud-name {
            font-size: 1rem; font-weight: 800;
            letter-spacing: 0.08em; text-transform: uppercase;
            margin-bottom: 10px;
        }
        .hud-bar-label {
            font-size: 0.65rem; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 3px;
        }
        .hud-bar-track {
            width: 100%; height: 12px;
            background: #1e293b; border-radius: 6px;
            overflow: hidden; margin-bottom: 4px;
        }
        .hud-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
        .hud-bar-fill.hp { background: linear-gradient(90deg,#e02020,#f06060); }
        .hud-bar-fill.energy { background: linear-gradient(90deg,#2060d0,#60a0f0); }
        .hud-bar-val { font-size: 0.7rem; color: #cbd5e1; text-align: right; margin-bottom: 8px; }
        .hud-role {
            font-size: 0.65rem; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.12em;
            border-top: 1px solid rgba(255,255,255,0.07);
            padding-top: 8px; margin-top: 4px;
        }

        /* ===== PANEL DE ACCIÓN INFERIOR ===== */
        #action-panel {
            position: fixed;
            bottom: 0; left: 50%; transform: translateX(-50%);
            z-index: 40;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-bottom: 20px;
            pointer-events: none;
        }
        #action-panel.visible { display: flex; }

        /* Sub-panel (habilidades / items) que aparece encima de los botones */
        #action-submenu {
            background: rgba(8, 14, 28, 0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            backdrop-filter: blur(16px);
            padding: 16px 20px;
            min-width: 340px;
            max-width: 520px;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        #action-submenu.visible { display: flex; }
        #submenu-title {
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
            text-transform: uppercase; color: #64748b;
            margin-bottom: 2px;
        }

        /* Grid de habilidades */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .skill-btn {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; padding: 10px 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.18s;
            pointer-events: auto;
            position: relative;
        }
        .skill-btn:hover { background: rgba(255,255,255,0.09); transform: translateY(-2px); }
        .skill-btn.supreme { border-color: rgba(251,191,36,0.5); }
        .skill-btn.supreme:hover { box-shadow: 0 0 14px rgba(251,191,36,0.4); }
        .skill-btn.no-energy { opacity: 0.45; cursor: not-allowed; }
        .skill-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .skill-name {
            font-size: 0.58rem; font-weight: 700; color: #e2e8f0;
            text-align: center; line-height: 1.2;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .skill-cost {
            font-size: 0.55rem; color: #60a0f0;
            font-weight: 600;
        }
        .skill-cost.free { color: #4ade80; }
        .skill-type-badge {
            font-size: 0.48rem; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        /* Tooltip de habilidad */
        .skill-tooltip {
            position: absolute; bottom: calc(100% + 8px); left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 22, 0.97);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 10px 12px;
            width: 190px; font-size: 0.65rem; color: #cbd5e1;
            line-height: 1.5; pointer-events: none;
            opacity: 0; transition: opacity 0.15s;
            z-index: 99; text-align: left;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .skill-btn:hover .skill-tooltip { opacity: 1; }
        .skill-tooltip b { color: #fcd34d; display: block; margin-bottom: 4px; font-size: 0.68rem; }

        /* Items vacíos */
        .items-empty {
            text-align: center; color: #334155;
            font-size: 0.75rem; padding: 20px 0;
            letter-spacing: 0.08em;
        }

        /* Botones principales (Habilidades / Defenderse / Item) */
        #action-main-btns {
            display: flex; gap: 10px;
            pointer-events: auto;
        }
        .act-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(10, 18, 36, 0.85);
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.18s;
            color: #e2e8f0;
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .act-btn .act-icon { font-size: 1.2rem; }
        .act-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
        .act-btn.skills-btn:hover  { border-color: rgba(99,179,255,0.6); color: #93c5fd; box-shadow: 0 0 18px rgba(59,130,246,0.3); }
        .act-btn.defend-btn:hover  { border-color: rgba(74,222,128,0.6); color: #86efac; box-shadow: 0 0 18px rgba(34,197,94,0.3); }
        .act-btn.items-btn:hover   { border-color: rgba(251,191,36,0.6); color: #fde68a; box-shadow: 0 0 18px rgba(245,158,11,0.3); }
        .act-btn.active            { background: rgba(255,255,255,0.08); }
        .act-btn.skills-btn.active { border-color: rgba(99,179,255,0.7); color: #93c5fd; }
        .act-btn.defend-btn.active { border-color: rgba(74,222,128,0.7); color: #86efac; }
        .act-btn.items-btn.active  { border-color: rgba(251,191,36,0.7); color: #fde68a; }

        /* Feedback flash de acción */
        #action-feedback {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 60; pointer-events: none;
            font-size: 1.6rem; font-weight: 900; letter-spacing: 0.08em;
            text-transform: uppercase; text-align: center;
            opacity: 0; transition: opacity 0.2s;
            text-shadow: 0 0 30px currentColor;
        }
        #action-feedback.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Feedback flash -->
    <div id="action-feedback"></div>

    <!-- Panel de acción inferior -->
    <div id="action-panel">
        <!-- Submenú (habilidades / items) -->
        <div id="action-submenu">
            <div id="submenu-title">Habilidades</div>
            <div id="submenu-content"></div>
        </div>
        <!-- Botones principales -->
        <div id="action-main-btns">
            <button class="act-btn skills-btn" onclick="toggleSubmenu('skills')">
                <span class="act-icon">⚔️</span>
                Habilidades
            </button>
            <button class="act-btn defend-btn" onclick="doDefend()">
                <span class="act-icon">🛡️</span>
                Defenderse
            </button>
            <button class="act-btn items-btn" onclick="toggleSubmenu('items')">
                <span class="act-icon">🎒</span>
                Item
            </button>
        </div>
    </div>

    <!-- Panel HUD lateral -->
    <div id="hud-panel">
        <div class="hud-card">
            <div id="hud-name" class="hud-name" style="color:#fff">—</div>
            <div class="hud-bar-label">❤ Vida</div>
            <div class="hud-bar-track"><div id="hud-hp-fill" class="hud-bar-fill hp" style="width:100%"></div></div>
            <div id="hud-hp-val" class="hud-bar-val">—</div>
            <div id="hud-energy-block">
            <div class="hud-bar-label">⚡ Energía</div>
            <div class="hud-bar-track"><div id="hud-en-fill" class="hud-bar-fill energy" style="width:100%"></div></div>
            <div id="hud-en-val" class="hud-bar-val">—</div>
            </div>
            <div id="hud-stats-extra" class="hud-role" style="border-top:none; padding-top:0; margin-top:2px; color:#94a3b8; font-size:0.6rem;">—</div>
            <div id="hud-role" class="hud-role">—</div>
        </div>
    </div>

    <!-- Pantalla de Carga -->
    <div id="loader">
        <div class="loader-ring">
            <div class="loader-ring-bg"></div>
            <div class="loader-ring-spin"></div>
        </div>
        <h1>Construyendo Puerto Griego</h1>
        <p>Generando geometrías, templos, pedestales y oleaje...</p>
    </div>

    <!-- UI overlay -->
    <div id="ui-overlay">
        <header id="ui-header">
            <div class="glass" id="time-panel">
                <div id="time-label-group">
                    <div class="label-top">Ciclo de Luz</div>
                    <div id="time-display">Mediodía Soleado</div>
                </div>
                <div id="time-buttons">
                    <button id="btn-morning" title="Amanecer">
                        <!-- sunrise icon -->
                        <svg viewBox="0 0 24 24"><path d="M12 2v2M4.93 4.93l1.41 1.41M2 12h2M19.07 4.93l-1.41 1.41M22 12h-2M12 6a6 6 0 0 1 6 6H6a6 6 0 0 1 6-6zM4 20h16M8 16h8"/></svg>
                    </button>
                    <button id="btn-noon" class="active" title="Mediodía">
                        <!-- sun icon -->
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </button>
                    <button id="btn-sunset" title="Atardecer">
                        <!-- sunset icon -->
                        <svg viewBox="0 0 24 24"><path d="M12 10a6 6 0 0 1 6 6H6a6 6 0 0 1 6-6zM4 20h16M8 16h8M12 2v2M4.93 4.93l1.41 1.41M19.07 4.93l-1.41 1.41M2 12h2M22 12h-2"/></svg>
                    </button>
                    <button id="btn-night" title="Noche">
                        <!-- moon icon -->
                        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </div>
        </header>
        <main></main>
        <footer></footer>
    </div>

    <!-- Código del Simulador 3D -->
    <script>
        // --- CONFIGURACIÓN Y VARIABLES GLOBALES ---
        let scene, camera, renderer, controls;
        let ambientLight, sunLight, pointLights = [];
        let skyMesh, oceanMesh;
        let shipGroup;
        let clock = new THREE.Clock();
        let mixerClock = new THREE.Clock(); // reloj independiente para AnimationMixer
        
        // Elementos interactivos del Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Estructura de datos de pedestales corregida, desplazada hacia la derecha (X +8)
        let pedestals = [
            { id: 0, name: "Holograma 5", pos: [-5, 3.8,  -5], group: null, character: null, status: "Holograma", type: "left" },
            { id: 1, name: "Holograma 6", pos: [-5, 3.8, -20], group: null, character: null, status: "Holograma", type: "left" },
            { id: 2, name: "Holograma 7", pos: [-5, 3.8, -35], group: null, character: null, status: "Holograma", type: "left" },
            { id: 3, name: "Holograma 4", pos: [10, 3.8, -20], group: null, character: null, status: "Holograma", type: "center" },
            { id: 4, name: "Holograma 1", pos: [25, 3.8,  -5], group: null, character: null, status: "Holograma", type: "right" },
            { id: 5, name: "Holograma 2", pos: [25, 3.8, -20], group: null, character: null, status: "Holograma", type: "right" },
            { id: 6, name: "Holograma 3", pos: [25, 3.8, -35], group: null, character: null, status: "Holograma", type: "right" }
        ];

        // Seleccionar inicialmente el pedestal de la Derecha 1 para que la cámara enfoque allí al inicio
        let selectedPedestalId = 4;

        // Configuración de atmósfera por momento del día
        const TIME_PRESETS = {
            morning: {
                name: "Amanecer Dorado",
                skyTop: 0x221a30,
                skyBottom: 0xffa07a,
                sunColor: 0xff8c00,
                sunIntensity: 0.8,
                sunPos: [80, 20, -50],
                ambientColor: 0x3d304a,
                ambientIntensity: 0.5,
                fogColor: 0xffa07a,
                fogDensity: 0.005
            },
            noon: {
                name: "Mediodía Soleado",
                skyTop: 0x1a82e2,
                skyBottom: 0x8ce1ff,
                sunColor: 0xffffff,
                sunIntensity: 1.4,
                sunPos: [30, 120, 30],
                ambientColor: 0xe0f7ff,
                ambientIntensity: 0.6,
                fogColor: 0xcceeff,
                fogDensity: 0.001
            },
            sunset: {
                name: "Atardecer Cálido",
                skyTop: 0x2c1b4d,
                skyBottom: 0xff4500,
                sunColor: 0xff5500,
                sunIntensity: 0.9,
                sunPos: [-90, 15, -20],
                ambientColor: 0x4a2a40,
                ambientIntensity: 0.4,
                fogColor: 0xff5500,
                fogDensity: 0.004
            },
            night: {
                name: "Noche de Antorchas",
                skyTop: 0x01040a,
                skyBottom: 0x050e1e,
                sunColor: 0x7c94b0,
                sunIntensity: 0.2,
                sunPos: [-40, 60, -40],
                ambientColor: 0x0d1b2a,
                ambientIntensity: 0.15,
                fogColor: 0x050e1e,
                fogDensity: 0.008
            }
        };

        let currentPreset = 'noon';

        // Inicialización tras cargar DOM
        window.onload = function() {
            init3D();
            buildScene();
            setupControls();
            buildPedestalsListUI();
            
            // Forzar la cámara y selección inicial
            selectPedestal(4);
            
            animate();
            
            // Ocultar pantalla de carga con suavidad (siempre, independiente del modelo)
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.pointerEvents = 'none';
                }
            }, 1500);
        };

        // --- INICIALIZAR ENTORNO THREE.JS ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            
            // Crear Escena con Niebla
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(TIME_PRESETS[currentPreset].fogColor, TIME_PRESETS[currentPreset].fogDensity);

            // Cámara
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);

            // Renderizador con soporte de Sombras y Antialiasing
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // Controles de Cámara (OrbitControls)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.02; // No traspasar el suelo
            controls.minDistance = 10;
            controls.maxDistance = 180;
            controls.target.set(0, 2, 0);

            // Colocación de cámara inicial
            changeCameraPreset('isometric'); 

            // Luces iniciales
            ambientLight = new THREE.AmbientLight(TIME_PRESETS[currentPreset].ambientColor, TIME_PRESETS[currentPreset].ambientIntensity);
            scene.add(ambientLight);

            sunLight = new THREE.DirectionalLight(TIME_PRESETS[currentPreset].sunColor, TIME_PRESETS[currentPreset].sunIntensity);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 300;
            
            const shadowDistance = 80;
            sunLight.shadow.camera.left = -shadowDistance;
            sunLight.shadow.camera.right = shadowDistance;
            sunLight.shadow.camera.top = shadowDistance;
            sunLight.shadow.camera.bottom = -shadowDistance;
            sunLight.shadow.bias = -0.0005;
            scene.add(sunLight);

            // Luz de relleno para el personaje Jason (modelo GLB Mixamo)
            // PointLight cálida encima del pedestal de Jason [25, 3.8, -20]
            const jasonLight = new THREE.PointLight(0xfff5e0, 2.5, 18);
            jasonLight.position.set(25, 9, -20);
            scene.add(jasonLight);
            // FillLight frontal suave (desde la cámara hacia Jason)
            const jasonFill = new THREE.DirectionalLight(0xffffff, 0.8);
            jasonFill.position.set(25, 7, -10);
            jasonFill.target.position.set(25, 4, -20);
            scene.add(jasonFill);
            scene.add(jasonFill.target);

            // Ajustar el Sol
            updateSunPosition();

            // Eventos
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', onDocumentPointerDown);
        }

        // --- PROCEDIMIENTOS DE CAMBIO DE TIEMPO / ILUMINACIÓN ---
        function updateSunPosition() {
            const preset = TIME_PRESETS[currentPreset];
            sunLight.position.set(...preset.sunPos);
        }

        function setTimeOfDay(timeKey) {
            currentPreset = timeKey;
            const preset = TIME_PRESETS[timeKey];

            // Actualizar textos UI
            document.getElementById('time-display').innerText = preset.name;
            
            // Reiniciar botones de la interfaz
            ['btn-morning', 'btn-noon', 'btn-sunset', 'btn-night'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.classList.remove('active');
            });
            const activeBtn = document.getElementById(`btn-${timeKey}`);
            if (activeBtn) activeBtn.classList.add('active');

            // Animación suave de luces usando transiciones o reemplazo directo
            scene.fog.color.setHex(preset.fogColor);
            scene.fog.density = preset.fogDensity;
            
            ambientLight.color.setHex(preset.ambientColor);
            ambientLight.intensity = preset.ambientIntensity;
            
            sunLight.color.setHex(preset.sunColor);
            sunLight.intensity = preset.sunIntensity;
            updateSunPosition();

            // Cambiar color del cielo
            updateSkyColor(preset.skyTop, preset.skyBottom);

            // Activar/desactivar antorchas nocturnas
            pointLights.forEach(light => {
                light.intensity = (timeKey === 'night') ? 1.5 : (timeKey === 'sunset' || timeKey === 'morning') ? 0.8 : 0.0;
            });
        }

        // Ajuste de Cámara manual/preset
        function changeCameraPreset(type) {
            if (!camera) return;
            
            if (type === 'muelle') {
                camera.position.set(-35, 12, -15);
                if (controls) controls.target.set(-30, 3, 10);
            } else if (type === 'plaza') {
                camera.position.set(0, 4, -5);
                if (controls) controls.target.set(0, 10, 45);
            } else if (type === 'templos') {
                camera.position.set(25, 9, 20);
                if (controls) controls.target.set(15, 12, 45);
            } else if (type === 'isometric') {
                camera.position.set(-50, 45, -50);
                if (controls) controls.target.set(0, 2, 10);
            }
            if (controls) controls.update();
        }

        // --- CONECTAR EVENTOS DE ENTRADA / CONTROLES ---
        function setupControls() {
            document.getElementById('btn-morning').addEventListener('click', () => setTimeOfDay('morning'));
            document.getElementById('btn-noon').addEventListener('click', () => setTimeOfDay('noon'));
            document.getElementById('btn-sunset').addEventListener('click', () => setTimeOfDay('sunset'));
            document.getElementById('btn-night').addEventListener('click', () => setTimeOfDay('night'));

        }

        // --- MANEJO DEL RAYCASTER (CLIC EN EL ESPACIO 3D) ---
        function onDocumentPointerDown(event) {
            // No interactuar si el clic fue en un elemento de la interfaz de usuario
            if (event.target.tagName !== 'CANVAS') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Obtener objetos interactivos (los grupos de pedestales)
            const targets = [];
            pedestals.forEach(p => {
                if (p.group) {
                    // Añadimos los hijos del pedestal para el raycasting
                    p.group.traverse(child => {
                        if (child.isMesh) {
                            child.userData = { pedestalId: p.id }; // Añadir ID de referencia
                            targets.push(child);
                        }
                    });
                }
            });

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                if (clickedMesh.userData && clickedMesh.userData.pedestalId !== undefined) {
                    selectPedestal(clickedMesh.userData.pedestalId);
                }
            }
        }

        function createSky() {
            const skyGeo = new THREE.SphereGeometry(450, 32, 15, 0, Math.PI * 2, 0, Math.PI / 2);
            const canvas = document.createElement('canvas');
            canvas.width = 2;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 128);
            gradient.addColorStop(0, '#1a82e2');
            gradient.addColorStop(1, '#8ce1ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 2, 128);

            const skyTex = new THREE.CanvasTexture(canvas);
            const skyMat = new THREE.MeshBasicMaterial({
                map: skyTex,
                side: THREE.BackSide,
                depthWrite: false
            });

            skyMesh = new THREE.Mesh(skyGeo, skyMat);
            skyMesh.rotation.y = Math.PI;
            scene.add(skyMesh);
        }

        function updateSkyColor(topColorHex, bottomColorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 2;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 128);
            gradient.addColorStop(0, '#' + topColorHex.toString(16).padStart(6, '0'));
            gradient.addColorStop(1, '#' + bottomColorHex.toString(16).padStart(6, '0'));
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 2, 128);

            const newTex = new THREE.CanvasTexture(canvas);
            skyMesh.material.map.dispose();
            skyMesh.material.map = newTex;
            skyMesh.material.needsUpdate = true;
        }

        function createClassicalTemple(x, z, width, depth, totalHeight) {
            const templeGroup = new THREE.Group();

            const marbleMat = new THREE.MeshStandardMaterial({
                color: 0xfcfbf7,
                roughness: 0.25,
                metalness: 0.05,
                flatShading: true
            });

            const roofInnerMat = new THREE.MeshStandardMaterial({
                color: 0xaa4433,
                roughness: 0.8,
                metalness: 0.1
            });

            const goldTrimMat = new THREE.MeshStandardMaterial({
                color: 0xd4af37,
                roughness: 0.3,
                metalness: 0.8
            });

            const stepHeight = totalHeight * 0.04;
            for (let i = 0; i < 3; i++) {
                const sWidth = width + (2 - i) * 1.5;
                const sDepth = depth + (2 - i) * 1.5;
                const baseStep = new THREE.Mesh(
                    new THREE.BoxGeometry(sWidth, stepHeight, sDepth),
                    marbleMat
                );
                baseStep.position.y = (i * stepHeight) + stepHeight/2;
                baseStep.receiveShadow = true;
                baseStep.castShadow = true;
                templeGroup.add(baseStep);
            }

            const columnsBaseY = 3 * stepHeight;

            const colHeight = totalHeight * 0.55;
            const colRadius = width * 0.035;
            const colGeo = new THREE.CylinderGeometry(colRadius * 0.85, colRadius, colHeight, 8);
            
            const numX = Math.round(width / (colRadius * 4));
            const numZ = Math.round(depth / (colRadius * 4));

            const offsetStartX = width/2 - colRadius * 1.5;
            const offsetStartZ = depth/2 - colRadius * 1.5;

            for (let cx = 0; cx < numX; cx++) {
                for (let cz = 0; cz < numZ; cz++) {
                    if (cx === 0 || cx === numX - 1 || cz === 0 || cz === numZ - 1) {
                        const colX = -offsetStartX + (cx * (offsetStartX * 2 / (numX - 1)));
                        const colZ = -offsetStartZ + (cz * (offsetStartZ * 2 / (numZ - 1)));

                        const col = new THREE.Mesh(colGeo, marbleMat);
                        col.position.set(colX, columnsBaseY + colHeight/2, colZ);
                        col.castShadow = true;
                        col.receiveShadow = true;
                        templeGroup.add(col);

                        const capGeo = new THREE.BoxGeometry(colRadius * 2.4, colHeight * 0.06, colRadius * 2.4);
                        const cap = new THREE.Mesh(capGeo, marbleMat);
                        cap.position.set(colX, columnsBaseY + colHeight + (colHeight * 0.03), colZ);
                        cap.castShadow = true;
                        templeGroup.add(cap);
                    }
                }
            }

            const cellaWidth = width * 0.6;
            const cellaDepth = depth * 0.7;
            const cellaHeight = colHeight;
            const cella = new THREE.Mesh(
                new THREE.BoxGeometry(cellaWidth, cellaHeight, cellaDepth),
                marbleMat
            );
            cella.position.set(0, columnsBaseY + cellaHeight/2, 0);
            cella.castShadow = true;
            cella.receiveShadow = true;
            templeGroup.add(cella);

            const entHeight = totalHeight * 0.12;
            const ent = new THREE.Mesh(
                new THREE.BoxGeometry(width, entHeight, depth),
                marbleMat
            );
            ent.position.set(0, columnsBaseY + colHeight + (colHeight * 0.06) + entHeight/2, 0);
            ent.castShadow = true;
            ent.receiveShadow = true;
            templeGroup.add(ent);

            const roofY = columnsBaseY + colHeight + (colHeight * 0.06) + entHeight;
            const roofPeakHeight = totalHeight * 0.22;

            const roofShape = new THREE.Shape();
            roofShape.moveTo(-width/2, 0);
            roofShape.lineTo(0, roofPeakHeight);
            roofShape.lineTo(width/2, 0);
            roofShape.closePath();

            const extrudeSettings = {
                depth: depth,
                bevelEnabled: true,
                bevelSegments: 2,
                steps: 1,
                bevelSize: 0.3,
                bevelThickness: 0.3
            };

            const roofGeo = new THREE.ExtrudeGeometry(roofShape, extrudeSettings);
            const roof = new THREE.Mesh(roofGeo, roofInnerMat);
            roof.position.set(0, roofY, -depth/2);
            roof.castShadow = true;
            roof.receiveShadow = true;
            templeGroup.add(roof);

            const trimThickness = 0.5;
            const frontPedimentTrim = new THREE.Mesh(
                new THREE.BoxGeometry(width + 1, trimThickness, 1.5),
                marbleMat
            );
            frontPedimentTrim.position.set(0, roofY, depth/2 + 0.2);
            templeGroup.add(frontPedimentTrim);

            const acroGeo = new THREE.ConeGeometry(colRadius, colRadius * 3, 4);
            const acro = new THREE.Mesh(acroGeo, goldTrimMat);
            acro.position.set(0, roofY + roofPeakHeight + (colRadius*1.5), depth/2);
            templeGroup.add(acro);
            
            const acroBack = acro.clone();
            acroBack.position.z = -depth/2;
            templeGroup.add(acroBack);

            templeGroup.position.set(x, 18, z);
            scene.add(templeGroup);
        }

        function createPedestals() {
            // Materiales de mármol pulido y oro para la base
            const baseMat = new THREE.MeshStandardMaterial({
                color: 0xeae8e2,
                roughness: 0.15,
                metalness: 0.1,
                flatShading: true
            });

            const goldTrimMat = new THREE.MeshStandardMaterial({
                color: 0xd4af37,
                roughness: 0.2,
                metalness: 0.8
            });

            pedestals.forEach(p => {
                const pGroup = new THREE.Group();
                pGroup.position.set(...p.pos);

                // 1. Base principal cilíndrica (La baldosa)
                const baseGeo = new THREE.CylinderGeometry(2.4, 2.6, 0.6, 16);
                const baseMesh = new THREE.Mesh(baseGeo, baseMat);
                baseMesh.position.y = 0.3;
                baseMesh.receiveShadow = true;
                baseMesh.castShadow = true;
                pGroup.add(baseMesh);

                // 2. Aro superior dorado
                const ringGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.1, 16, 1, true);
                const ringMesh = new THREE.Mesh(ringGeo, goldTrimMat);
                ringMesh.position.y = 0.61;
                pGroup.add(ringMesh);

                // 3. Aro brillante mágico (Cian para Izquierda, Ámbar para Centro, Rosa/Magenta para Derecha)
                let energyColor = 0x00ffff; // Izquierda por defecto (Cian)
                if (p.type === 'center') energyColor = 0xf59e0b; // Centro (Ámbar)
                if (p.type === 'right') energyColor = 0xec4899;  // Derecha (Rosa)

                const energyMat = new THREE.MeshBasicMaterial({
                    color: energyColor,
                    transparent: true,
                    opacity: 0.6

        function makeBarSprite(pedestal) {
            const cd = CHARACTER_DATA[pedestal.name];
            if (!cd) return;

            const W = 256, H = 80;
            const canvas = document.createElement('canvas');
            canvas.width = W; canvas.height = H;
            const ctx = canvas.getContext('2d');

            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Nombre
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(cd.charName, W/2, 14);

                // Barra vida
                ctx.fillStyle = '#333';
                ctx.fillRect(10, 22, W-20, 16);
                ctx.fillStyle = '#e04040';
                ctx.fillRect(10, 22, (W-20) * (cd.hp / cd.maxHp), 16);
                ctx.fillStyle = '#fff';
                ctx.font = '11px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`❤ ${cd.hp}/${cd.maxHp}`, 13, 34);

                // Barra energía
                ctx.fillStyle = '#333';
                ctx.fillRect(10, 44, W-20, 16);
                ctx.fillStyle = '#4080e0';
                ctx.fillRect(10, 44, (W-20) * (cd.energy / cd.maxEnergy), 16);
                ctx.fillStyle = '#fff';
                ctx.fillText(`⚡ ${cd.energy}/${cd.maxEnergy}`, 13, 56);
            }

            draw();
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(7, 2.2, 1);
            sprite.position.set(0, 9, 0);
            pedestal.group.add(sprite);

            barSprites[pedestal.id] = { canvas, ctx, tex, draw, cd };
        }

        // ── Parche único: Three.js usa fetch() incluso para data:URI (bloqueado por CSP).
        //    Sobreescribimos FileLoader e ImageLoader para que los data:URI se resuelvan
        //    con JS puro (atob / new Image), sin ninguna llamada de red. ──
        let _loaderPatched = false;
        function patchThreeForDataURI() {
            if (_loaderPatched) return;
            _loaderPatched = true;

            // FileLoader → manejar data:URI con atob
            const _origFileLoad = THREE.FileLoader.prototype.load;
            THREE.FileLoader.prototype.load = function(url, onLoad, onProgress, onError) {
                if (typeof url === 'string' && url.startsWith('data:')) {
                    try {
                        const b64  = url.slice(url.indexOf(',') + 1);
                        const bin  = atob(b64);
                        if (this.responseType === 'arraybuffer') {
                            const buf  = new ArrayBuffer(bin.length);
                            const view = new Uint8Array(buf);
                            for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
                            setTimeout(() => onLoad && onLoad(buf), 0);
                        } else {
                            setTimeout(() => onLoad && onLoad(bin), 0);
                        }
                    } catch(e) { if (onError) onError(e); }
                    return this;
                }
                return _origFileLoad.call(this, url, onLoad, onProgress, onError);
            };

            // ImageLoader → manejar data:URI con new Image() nativo
            const _origImgLoad = THREE.ImageLoader.prototype.load;
            THREE.ImageLoader.prototype.load = function(url, onLoad, onProgress, onError) {
                if (typeof url === 'string' && url.startsWith('data:')) {
                    const img = new Image();
                    img.onload  = () => { if (onLoad) onLoad(img); };
                    img.onerror = (e) => { if (onError) onError(e); };
                    img.src = url;
                    return img;
                }
                return _origImgLoad.call(this, url, onLoad, onProgress, onError);
            };
        }

        // Carga a JASÓN desde un FBX de Mixamo (animación neutral)
        function loadSoldadoInPedestal(pedestal) {
            const FBX_URL = "https://cdn.jsdelivr.net/gh/salomonbonilla28-ui/Juego-Jason@main/Movimiento%20neutral%20Jason.fbx";

            const loader = new THREE.FBXLoader();
            loader.load(FBX_URL, (object) => {

                // Escalar dinámicamente al mismo targetHeight que los demás personajes (3.5 u)
                const targetHeight = 5.5;
                object.updateMatrixWorld(true);
                const box    = new THREE.Box3().setFromObject(object);
                const size   = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                const scaleFactor = targetHeight / size.y;
                object.scale.setScalar(scaleFactor);
                // Recalcular BB con la nueva escala para centrar correctamente
                object.updateMatrixWorld(true);
                const box2    = new THREE.Box3().setFromObject(object);
                const size2   = box2.getSize(new THREE.Vector3());
                const center2 = box2.getCenter(new THREE.Vector3());
                // Apoyar pies sobre el pedestal (y=0.65)
                object.position.y = 0.65 - (center2.y - size2.y / 2);
                object.position.x = -center2.x;
                object.position.z = -center2.z;

                // Mirar hacia el interior de la escena
                object.rotation.y = -Math.PI / 2;

                // Sombras + normalizar materiales FBX/Mixamo
                object.traverse(n => {
                    if (n.isMesh) {
                        n.castShadow    = true;
                        n.receiveShadow = true;
                        const mats = Array.isArray(n.material) ? n.material : [n.material];
                        mats.forEach(m => {
                            // Fix color negro
                            if (m.color && m.color.r === 0 && m.color.g === 0 && m.color.b === 0) {
                                m.color.set(0xd4956a);
                            }
                            // Apagar brillo excesivo de FBX
                            if (m.isMeshPhongMaterial) {
                                m.shininess  = 10;
                                m.specular && m.specular.set(0x111111);
                            }
                            if (m.isMeshStandardMaterial) {
                                m.roughness  = 0.75;
                                m.metalness  = 0.05;
                                m.envMapIntensity = 0.3;
                            }
                            m.needsUpdate = true;
                        });
                    }
                });

                // AnimationMixer: activar todas las clips de Mixamo en loop
                console.log("[Jason FBX] animaciones encontradas:", object.animations.length, object.animations.map(a => a.name));
                if (object.animations && object.animations.length > 0) {
                    const mixer = new THREE.AnimationMixer(object);
                    const action = mixer.clipAction(object.animations[0]);
                    action.setLoop(THREE.LoopRepeat, Infinity);
                    action.clampWhenFinished = false;
                    action.play();
                    pedestal.mixer = mixer;
                    mixerClock.stop();
                    mixerClock.start(); // resetear para que getDelta() empiece desde 0
                }

                pedestal.group.add(object);
                pedestal.character = object;
                pedestal.status    = "Jason 3D";

            }, undefined, (err) => {
                console.error("Error cargando FBX de Jason:", err);
            });
        }

        // --- ESCENARIO DE ACCIÓN (Pedestal Central id=3) ---
        // Mueve el personaje del pedestal `fromId` al centro, ejecuta el callback y lo devuelve.
        const ACTION_STAGE_ID = 3; // Holograma 4 = pedestal central
        let actionInProgress = false;

        function performAction(fromId, onStageCallback) {
            if (actionInProgress) return;
            const origin = pedestals[fromId];
            const stage  = pedestals[ACTION_STAGE_ID];
            if (!origin || !origin.character) return;
            if (fromId === ACTION_STAGE_ID) return; // ya está en el centro

            actionInProgress = true;

            // Posiciones en espacio mundial
            const originPos = new THREE.Vector3(...origin.pos);
            const stagePos  = new THREE.Vector3(...stage.pos);

            // Sacar el personaje del grupo del pedestal origen y moverlo a la escena directamente
            const char = origin.character;
            // Convertir posición local → mundial
            origin.group.localToWorld(char.position);
            origin.group.remove(char);
            scene.add(char);

            // Altura de "salto" en el viaje de ida
            const jumpHeight = 6;

            // ---- ANIMACIÓN IDA ----
            tweenMove(char.position, stagePos, 0.8, jumpHeight, () => {
                // Colocar personaje sobre el pedestal central (relativo a su grupo)
                scene.remove(char);
                stage.group.add(char);
                char.position.set(0, 0.65, 0);

                // Ejecutar lógica de acción (si la hay)
                if (typeof onStageCallback === 'function') onStageCallback();

                // Esperar un momento en escena y luego devolver
                setTimeout(() => {
                    // Sacar del grupo central
                    stage.group.localToWorld(char.position);
                    stage.group.remove(char);
                    scene.add(char);

                    // ---- ANIMACIÓN VUELTA ----
                    tweenMove(char.position, originPos, 0.8, jumpHeight, () => {
                        // Devolver al grupo origen
                        scene.remove(char);
                        origin.group.add(char);
                        char.position.set(0, 0.65, 0);
                        actionInProgress = false;
                    });
                }, 1200); // tiempo en escena
            });
        }

        // Interpolación suave con arco de salto usando requestAnimationFrame
        function tweenMove(currentPos, targetPos, durationSec, arcHeight, onComplete) {
            const startPos = currentPos.clone();
            const startTime = performance.now();
            const durationMs = durationSec * 1000;

            function step(now) {
                const t = Math.min((now - startTime) / durationMs, 1);
                const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut

                currentPos.lerpVectors(startPos, targetPos, ease);
                // Arco parabólico en Y
                currentPos.y = THREE.MathUtils.lerp(startPos.y, targetPos.y, ease)
                             + arcHeight * Math.sin(Math.PI * t);

                if (t < 1) {
                    requestAnimationFrame(step);
                } else {
                    currentPos.copy(targetPos);
                    if (onComplete) onComplete();
                }
            }
            requestAnimationFrame(step);
        }

        // Cargar un archivo .glb de forma remota (p. ej. desde Dropbox)
        function loadRemoteCharacter(id, url) {
            const p = pedestals[id];
            if (!p) return;

            const gltfLoader = new THREE.GLTFLoader();
            gltfLoader.load(url, (gltf) => {
                const model = gltf.scene;

                // Eliminar el holograma por defecto o modelo anterior
                removeCharacterFromPedestal(id);

                // Calcular tamaño automático y centrar el modelo cargado
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                // Escalar a una altura estándar
                const targetHeight = 5.5;
                const scaleFactor = targetHeight / size.y;
                model.scale.set(scaleFactor, scaleFactor, scaleFactor);

                // Ajustar pivote para que los pies queden sobre el pedestal
                model.position.y = 0.6 - (center.y - size.y / 2) * scaleFactor;
                model.position.x = -center.x * scaleFactor;
                model.position.z = -center.z * scaleFactor;

                // Habilitar sombras
                model.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });

                p.group.add(model);

        // Carga y renderizado de archivo .GLB / .GLTF local
        function handleGLBUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            
            // Mostrar pantalla de carga rápida
            const loaderEl = document.getElementById('loader');
            if (loaderEl) {
                loaderEl.classList.remove('opacity-0');
                const loadText = loaderEl.querySelector('p');
                if (loadText) loadText.innerText = "Importando modelo 3D GLB...";
            }

            // Crear una URL temporal del archivo cargado
            const url = URL.createObjectURL(file);

            const gltfLoader = new THREE.GLTFLoader();
            gltfLoader.load(url, (gltf) => {
                const model = gltf.scene;

                // Preparar pedestal para recibir el nuevo modelo
                removeCharacterFromPedestal(selectedPedestalId);

                // Calcular tamaño automático y centrar el modelo cargado
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                // Escalar a una altura estándar de aprox. 3.5 unidades para que quepa bien
                const targetHeight = 5.5;
                const scaleFactor = targetHeight / size.y;
                model.scale.set(scaleFactor, scaleFactor, scaleFactor);

                // Ajustar pivote para que los pies queden sobre el pedestal
                model.position.y = 0.6 - (center.y - size.y / 2) * scaleFactor;
                model.position.x = -center.x * scaleFactor;
                model.position.z = -center.z * scaleFactor;

                // Habilitar sombras para el modelo cargado
                model.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });

                // Incorporar el modelo al grupo del pedestal correspondiente
                const p = pedestals[selectedPedestalId];
                p.group.add(model);
                p.character = model;
                p.status = "Cargado";

                // Actualizar interfaz
                buildPedestalsListUI();
                selectPedestal(selectedPedestalId);

                // Ocultar pantalla de carga
                if (loaderEl) loaderEl.classList.add('opacity-0');
            }, undefined, (error) => {
                console.error("Error al cargar el archivo GLB:", error);
                if (loaderEl) loaderEl.classList.add('opacity-0');
            });
        }

        // --- BUCLE DE ANIMACIÓN PRINCIPAL ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. Efecto de oleaje suave en el mar
            const posAttr = oceanMesh.geometry.attributes.position;
            const v = new THREE.Vector3();
            for (let i = 0; i < posAttr.count; i++) {
                v.fromBufferAttribute(posAttr, i);
                
                const wave1 = Math.sin(v.x * 0.15 + time * 1.2) * 0.25;
                const wave2 = Math.cos(v.y * 0.15 + time * 1.0) * 0.25;
                const wave3 = Math.sin((v.x + v.y) * 0.05 + time * 0.5) * 0.4;
                
                posAttr.setZ(i, wave1 + wave2 + wave3);
            }
            posAttr.needsUpdate = true;
            oceanMesh.geometry.computeVertexNormals();

            // 2. Movimiento del barco amarrado
            if (shipGroup) {
                shipGroup.position.y = 1.1 + Math.sin(time * 1.5) * 0.12;
                shipGroup.rotation.z = Math.sin(time * 1.1) * 0.015;
                shipGroup.rotation.x = Math.cos(time * 0.9) * 0.008;
            }

            // 3. Animación de los hologramas/estatuas por defecto (Rotación mágica lenta + Levitación)
            const mixerDelta = mixerClock.getDelta(); // UNA sola lectura por frame
            pedestals.forEach(p => {
                if (p.character && p.status === "Holograma") {
                    p.character.rotation.y = time * 0.5;
                    p.character.position.y = 0.6 + Math.sin(time * 2 + p.id) * 0.1;
                } else if (p.character && p.status === "Cargado") {
                    p.character.rotation.y = time * 0.2;
                }
                if (p.mixer) p.mixer.update(mixerDelta);
            });

            // 4. Parpadeo místico en el haz de luz de las baldosas
            pedestals.forEach(p => {
                if (p.group) {
                    const beam = p.group.children[3]; // El haz de luz cilíndrico
                    if (beam) {
                        beam.material.opacity = 0.06 + Math.sin(time * 3 + p.id) * 0.02;
                    }
                }
            });

            // 5. Parpadeo de antorchas
            pointLights.forEach((light, idx) => {
                if (light.intensity > 0) {
                    const noise = Math.sin(time * 8 + idx * 10) * Math.cos(time * 15 + idx * 5) * 0.25;
                    light.intensity = (currentPreset === 'night' ? 1.5 : 0.8) + noise;

            });

            // Actualizar controles de cámara
            if (controls) controls.update();

            // Renderizado de la escena
            renderer.render(scene, camera);

        // ================================================================
        //  FÓRMULAS DE COMBATE
        // ================================================================

        function resolveAttack(atkCd, defCd, mult, guaranteedCrit, defMult) {
            defMult = defMult || 1.0;
            const hitChance = atkCd.precision - defCd.evasion;
            if (Math.random() > hitChance)
                return { hit:false, crit:false, damage:0, label:"💨 ¡Fallado!", color:"#94a3b8" };

            const effectiveDef = defCd.def * defMult;
            const baseDmg = Math.max(1, (atkCd.atk * mult) - (effectiveDef * 0.4));
            const isCrit = guaranteedCrit || (Math.random() < atkCd.critChance);
            const finalDmg = Math.round(isCrit ? baseDmg * atkCd.critMult : baseDmg);
            const label = isCrit ? `💥 ¡CRÍTICO! −${finalDmg}` : `⚔️ −${finalDmg} daño`;
            return { hit:true, crit:isCrit, damage:finalDmg, label, color: isCrit?"#fbbf24":"#f87171" };
        }

        function applyEffect(pedestalId, effect) {
            if (!activeEffects[pedestalId]) activeEffects[pedestalId] = [];
            activeEffects[pedestalId].push(effect);
        }

        function applyTeamBuff(team, mods, turns) {
            pedestals.forEach(p => {
                const cd = CHARACTER_DATA[p.name];
                if (!cd || cd.team !== team || cd.hp <= 0) return;
                if (!activeEffects[p.id]) activeEffects[p.id] = [];
                activeEffects[p.id].push({...mods, duration:turns});
            });
            const parts = [];
            if (mods.atk_mult) parts.push(`ATK ×${mods.atk_mult}`);
            if (mods.def_mult) parts.push(`DEF ×${mods.def_mult}`);
            if (mods.regen)    parts.push(`Regen +${mods.regen} HP/t`);
            showFeedback(`✦ ${parts.join(" · ")} (${turns}t)`, "#4ade80");
        }

        function getEffectiveMultipliers(pedestalId) {
            const effects = activeEffects[pedestalId] || [];
            let atkMult=1.0, defMult=1.0;
            effects.forEach(ef => {
                if (ef.atk_mult) atkMult *= ef.atk_mult;
                if (ef.def_mult) defMult *= ef.def_mult;
            });
            return { atkMult, defMult };
        }

        function processEffects(pedestalId) {
            const effects = activeEffects[pedestalId];
            if (!effects || !effects.length) return;
            const cd = CHARACTER_DATA[pedestals[pedestalId].name];
            if (!cd) return;
            const toRemove = [];
            effects.forEach((ef, i) => {
                if (ef.regen)    cd.hp = Math.min(cd.maxHp, cd.hp + ef.regen);
                if (ef.sangrado) cd.hp = Math.max(0, cd.hp - 25);
                ef.duration--;
                if (ef.duration <= 0) toRemove.push(i);
            });
            toRemove.reverse().forEach(i => effects.splice(i,1));
        }

            const p = pedestals[pedestalId];

            }
            showFeedback(`💀 ${cd.charName} derrotado`, "#f87171", true);
        }

        function isAlive(pedestalId) {
            const cd = CHARACTER_DATA[pedestals[pedestalId].name];
            return cd && cd.hp > 0;
        }

        function getAliveHeroes() {
            return pedestals.filter(p => {
                const cd = CHARACTER_DATA[p.name];
                return cd && cd.team === "heroes" && cd.hp > 0;
            });
        }

        function getAliveEnemies() {
            return pedestals.filter(p => {
                const cd = CHARACTER_DATA[p.name];
                return cd && cd.team === "guards" && cd.hp > 0;

            pedestals.forEach(p => {
                if (p.group) {

                    if (ring) ring.material.opacity = 0.6;

        function updateRoundHUD() {
            // Resaltar héroes que aún pueden actuar
            const aliveHeroes = getAliveHeroes();
            aliveHeroes.forEach(p => {
                const pending = !heroesActed.has(p.id);
                const ring = p.group && p.group.children[2];
                if (ring) ring.material.opacity = pending ? 0.8 : 0.15;
