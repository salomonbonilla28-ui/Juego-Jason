<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batalla de los Argonautas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8b6914;
    --crimson: #8b1a1a;
    --crimson-light: #c0392b;
    --blood: #5c0a0a;
    --stone: #1a1510;
    --stone-mid: #2a2018;
    --stone-light: #3d3020;
    --parchment: #d4b896;
    --sky: #1a2a4a;
    --energy-color: #4a9eff;
    --hp-color: #2ecc71;
    --hp-low: #e74c3c;
    --effect-stun: #f39c12;
    --effect-confuse: #9b59b6;
    --effect-bleed: #e74c3c;
    --effect-prov: #e67e22;
    --effect-immune: #1abc9c;
    --effect-regen: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Cinzel', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    color: var(--parchment);
    user-select: none;
  }

  #canvas-container {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  #canvas-container canvas {
    width: 100% !important;
    height: 100% !important;
  }

  /* ── LOADING SCREEN ── */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #1a1208 0%, #000 100%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  #loading-screen h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(20px, 4vw, 42px);
    color: var(--gold);
    text-shadow: 0 0 30px var(--gold-dark), 0 0 60px #8b6914;
    letter-spacing: 4px;
    text-align: center;
    padding: 0 20px;
  }
  #loading-bar-wrap {
    width: min(400px, 80vw);
    height: 6px;
    background: #2a2018;
    border: 1px solid var(--gold-dark);
    border-radius: 3px;
    overflow: hidden;
  }
  #loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 3px;
  }
  #loading-text {
    font-size: 13px;
    color: var(--gold-dark);
    letter-spacing: 2px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
  }

  /* ── HUD TOP ── */
  #hud-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: linear-gradient(180deg, rgba(10,8,4,0.97) 0%, rgba(10,8,4,0.0) 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
    pointer-events: none;
  }
  #round-display {
    font-family: 'Cinzel Decorative', serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 3px;
    text-shadow: 0 0 10px var(--gold-dark);
  }
  #turn-display {
    font-size: 12px;
    color: var(--parchment);
    letter-spacing: 2px;
    opacity: 0.8;
  }

  /* ── CHARACTER CARDS (bottom sides) ── */
  #ally-panel {
    position: fixed;
    bottom: 160px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
  }
  #enemy-panel {
    position: fixed;
    bottom: 160px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
    align-items: flex-end;
  }

  .char-card {
    background: linear-gradient(135deg, rgba(26,21,16,0.92) 0%, rgba(42,32,24,0.92) 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 6px;
    padding: 7px 10px;
    width: 180px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    backdrop-filter: blur(4px);
  }
  .char-card:hover:not(.dead):not(.no-turn) {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.4);
    transform: translateX(2px);
  }
  .char-card.selected {
    border-color: var(--gold-light);
    box-shadow: 0 0 18px rgba(240,208,128,0.5);
    background: linear-gradient(135deg, rgba(42,32,18,0.95) 0%, rgba(60,45,20,0.95) 100%);
  }
  .char-card.targeted {
    border-color: var(--crimson-light);
    box-shadow: 0 0 14px rgba(192,57,43,0.5);
    animation: pulse-target 0.7s ease-in-out infinite alternate;
  }
  @keyframes pulse-target {
    from { box-shadow: 0 0 8px rgba(192,57,43,0.3); }
    to { box-shadow: 0 0 20px rgba(192,57,43,0.7); }
  }
  .char-card.dead {
    opacity: 0.35;
    filter: grayscale(1);
    cursor: default;
    pointer-events: none;
  }
  .char-card.no-turn {
    opacity: 0.6;
    cursor: default;
  }
  .char-card.ally-targeted {
    border-color: #2ecc71;
    box-shadow: 0 0 14px rgba(46,204,113,0.5);
    animation: pulse-ally 0.7s ease-in-out infinite alternate;
  }
  @keyframes pulse-ally {
    from { box-shadow: 0 0 8px rgba(46,204,113,0.3); }
    to { box-shadow: 0 0 20px rgba(46,204,113,0.7); }
  }
  .enemy-card { cursor: default; }
  .enemy-card.targetable { cursor: crosshair; }

  .char-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .bar-row { margin-bottom: 3px; }
  .bar-label { font-size: 9px; color: rgba(212,184,150,0.6); letter-spacing: 1px; margin-bottom: 2px; }
  .bar-bg {
    height: 7px;
    background: rgba(0,0,0,0.5);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .hp-bar { background: linear-gradient(90deg, #1a6b3a, #2ecc71); }
  .hp-bar.low { background: linear-gradient(90deg, #6b1a1a, #e74c3c); }
  .ep-bar { background: linear-gradient(90deg, #1a3a6b, #4a9eff); }

  .effects-row {
    display: flex;
    gap: 3px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .effect-icon {
    width: 16px; height: 16px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
  }
  .effect-icon .dur {
    position: absolute;
    bottom: -1px; right: -1px;
    font-size: 7px;
    background: rgba(0,0,0,0.8);
    border-radius: 2px;
    padding: 0 1px;
    color: white;
  }
  .turn-used-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: rgba(212,184,150,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── ACTION PANEL ── */
  #action-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 155px;
    background: linear-gradient(180deg, rgba(8,6,3,0) 0%, rgba(8,6,3,0.98) 20%, rgba(8,6,3,1) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 16px;
    gap: 10px;
    z-index: 200;
    pointer-events: none;
  }

  #selected-char-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 3px;
    text-shadow: 0 0 8px var(--gold-dark);
    min-height: 18px;
    pointer-events: none;
  }

  #main-buttons {
    display: flex;
    gap: 12px;
    pointer-events: auto;
  }

  .main-btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .main-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
  }
  .btn-skills {
    background: linear-gradient(180deg, #2a1e08 0%, #1a1208 100%);
    border-color: var(--gold-dark);
    color: var(--gold-light);
  }
  .btn-skills:hover {
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(201,168,76,0.4);
    transform: translateY(-2px);
  }
  .btn-defend {
    background: linear-gradient(180deg, #0a1e2a 0%, #061218 100%);
    border-color: #2a6080;
    color: #7ac5e8;
  }
  .btn-defend:hover {
    border-color: #4a9eff;
    box-shadow: 0 0 14px rgba(74,158,255,0.4);
    transform: translateY(-2px);
  }
  .btn-item {
    background: linear-gradient(180deg, #1a0a1e 0%, #100612 100%);
    border-color: #5a2a7a;
    color: #c080e8;
  }
  .btn-item:hover {
    border-color: #9b59b6;
    box-shadow: 0 0 14px rgba(155,89,182,0.4);
    transform: translateY(-2px);
  }

  /* ── SKILL PANEL ── */
  #skill-panel {
    position: fixed;
    bottom: 155px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 10px;
    z-index: 201;
    pointer-events: auto;
    background: linear-gradient(180deg, rgba(8,5,2,0.95) 0%, rgba(16,10,4,0.98) 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 360px;
  }
  #skill-panel.visible { display: flex; flex-direction: column; gap: 8px; }

  .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .skill-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(30,22,10,0.9) 0%, rgba(20,15,7,0.9) 100%);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--parchment);
    text-align: left;
  }
  .skill-btn:hover:not(.locked) {
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(201,168,76,0.3);
    transform: translateY(-1px);
  }
  .skill-btn.locked {
    opacity: 0.4;
    cursor: not-allowed;
    filter: grayscale(0.5);
  }
  .skill-icon {
    width: 36px; height: 36px;
    border-radius: 4px;
    background: linear-gradient(135deg, #2a1e08, #1a1208);
    border: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .skill-info { flex: 1; }
  .skill-name { font-size: 10px; font-weight: 700; color: var(--gold-light); letter-spacing: 1px; margin-bottom: 2px; }
  .skill-cost { font-size: 9px; color: var(--energy-color); font-family: 'IM Fell English', serif; }
  .skill-desc { font-size: 8px; color: rgba(212,184,150,0.6); font-family: 'IM Fell English', serif; font-style: italic; margin-top: 1px; }
  #skill-panel-title { font-size: 11px; color: var(--gold-dark); letter-spacing: 2px; text-align: center; margin-bottom: 2px; }

  /* ── ITEM PANEL ── */
  #item-panel {
    position: fixed;
    bottom: 155px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 201;
    pointer-events: auto;
    background: linear-gradient(180deg, rgba(8,5,2,0.95) 0%, rgba(16,10,4,0.98) 100%);
    border: 1px solid rgba(155,89,182,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    min-width: 240px;
    text-align: center;
    color: rgba(212,184,150,0.5);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
  }
  #item-panel.visible { display: block; }

  /* ── TARGET MODE BANNER ── */
  #target-banner {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(140,26,26,0.9);
    border: 1px solid var(--crimson-light);
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 12px;
    letter-spacing: 2px;
    color: #ff9999;
    z-index: 300;
    display: none;
    pointer-events: none;
    backdrop-filter: blur(4px);
    text-align: center;
  }
  #target-banner.visible { display: block; }
  #target-banner.ally-mode {
    background: rgba(26,90,55,0.9);
    border-color: #2ecc71;
    color: #99ffcc;
  }

  /* ── BATTLE LOG ── */
  #battle-log {
    position: fixed;
    top: 60px;
    right: 10px;
    width: 220px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    pointer-events: none;
  }
  .log-entry {
    font-family: 'IM Fell English', serif;
    font-size: 11px;
    color: rgba(212,184,150,0.75);
    padding: 3px 6px;
    border-left: 2px solid transparent;
    margin-bottom: 2px;
    animation: fadeInLog 0.3s ease;
  }
  .log-entry.dmg { border-left-color: var(--crimson-light); color: #ffaaaa; }
  .log-entry.heal { border-left-color: #2ecc71; color: #aaffcc; }
  .log-entry.buff { border-left-color: var(--gold); color: #ffe080; }
  .log-entry.info { border-left-color: #4a9eff; color: #aaccff; }
  .log-entry.crit { border-left-color: #ff6600; color: #ffcc88; }
  @keyframes fadeInLog {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  #battle-log::-webkit-scrollbar { width: 3px; }
  #battle-log::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

  /* ── FLOATING DAMAGE ── */
  .float-dmg {
    position: fixed;
    font-family: 'Cinzel Decorative', serif;
    font-size: 22px;
    font-weight: 900;
    pointer-events: none;
    z-index: 500;
    animation: floatUp 1.2s ease forwards;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .float-dmg.dmg { color: #ff4444; }
  .float-dmg.crit { color: #ff8800; font-size: 28px; }
  .float-dmg.heal { color: #44ff88; }
  .float-dmg.miss { color: #aaaaaa; font-size: 16px; font-family: 'IM Fell English', serif; font-style: italic; }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    30% { opacity: 1; transform: translateY(-20px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
  }

  /* ── VICTORY / DEFEAT SCREEN ── */
  #result-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.92) 100%);
    z-index: 999;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    backdrop-filter: blur(6px);
  }
  #result-screen.visible { display: flex; animation: fadeInResult 0.8s ease; }
  @keyframes fadeInResult {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  #result-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(36px, 8vw, 72px);
    letter-spacing: 6px;
    text-shadow: 0 0 40px currentColor, 0 0 80px currentColor;
  }
  #result-title.victory { color: var(--gold); }
  #result-title.defeat { color: var(--crimson-light); }
  #result-subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--parchment);
    opacity: 0.8;
    text-align: center;
  }
  #result-reward {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--gold-light);
    letter-spacing: 2px;
  }
  .result-btn {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 32px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--gold-dark);
    background: linear-gradient(180deg, #2a1e08 0%, #1a1208 100%);
    color: var(--gold-light);
    transition: all 0.2s;
    margin: 0 8px;
  }
  .result-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,0.5);
    transform: translateY(-2px);
  }
  .result-btn.secondary { border-color: #444; color: #aaa; background: rgba(20,15,10,0.8); }
  .result-buttons { display: flex; gap: 12px; }

  /* ── ENEMY TURN INDICATOR ── */
  #enemy-turn-indicator {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--crimson-light);
    letter-spacing: 4px;
    z-index: 400;
    display: none;
    text-shadow: 0 0 20px rgba(192,57,43,0.8);
    animation: pulseTurn 1s ease-in-out infinite;
  }
  #enemy-turn-indicator.visible { display: block; }
  @keyframes pulseTurn {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* ── AI THINKING ── */
  #ai-thinking {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(212,184,150,0.5);
    letter-spacing: 2px;
    z-index: 300;
    display: none;
  }
  #ai-thinking.visible { display: block; }

  /* ── STUN/SKIP MSG ── */
  #effect-notice {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(243,156,18,0.2);
    border: 1px solid var(--effect-stun);
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 14px;
    color: #f8c760;
    letter-spacing: 2px;
    z-index: 450;
    display: none;
    text-align: center;
  }
  #effect-notice.visible { display: block; }

  /* Scrollbar hide for log */
  #battle-log { scrollbar-width: thin; scrollbar-color: var(--gold-dark) transparent; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <h1>⚔ Batalla de los Argonautas ⚔</h1>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text">Preparando el campo de batalla...</div>
</div>

<!-- THREE.JS CANVAS -->
<div id="canvas-container"></div>

<!-- HUD TOP -->
<div id="hud-top">
  <div id="round-display">RONDA 1</div>
  <div id="turn-display">TURNO DEL JUGADOR</div>
</div>

<!-- BATTLE LOG -->
<div id="battle-log"></div>

<!-- CHARACTER PANELS -->
<div id="ally-panel"></div>
<div id="enemy-panel"></div>

<!-- TARGET BANNER -->
<div id="target-banner">SELECCIONA UN ENEMIGO</div>

<!-- ACTION PANEL -->
<div id="action-panel">
  <div id="selected-char-name"></div>
  <div id="main-buttons">
    <button class="main-btn btn-skills" id="btn-skills" onclick="openSkills()">⚔ Habilidades</button>
    <button class="main-btn btn-defend" id="btn-defend" onclick="doDefend()">🛡 Defenderse</button>
    <button class="main-btn btn-item" id="btn-item" onclick="toggleItem()">🎒 Item</button>
  </div>
</div>

<!-- SKILL PANEL -->
<div id="skill-panel">
  <div id="skill-panel-title">HABILIDADES</div>
  <div class="skill-grid" id="skill-grid"></div>
</div>

<!-- ITEM PANEL -->
<div id="item-panel">
  <div style="font-size:11px;letter-spacing:2px;color:var(--gold-dark);margin-bottom:8px;">INVENTARIO</div>
  El inventario está vacío por ahora.<br>Los ítems se añadirán en futuras expediciones.
</div>

<!-- ENEMY TURN -->
<div id="enemy-turn-indicator">⚔ TURNO ENEMIGO ⚔</div>
<div id="ai-thinking">El enemigo está pensando...</div>
<div id="effect-notice"></div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div id="result-title">VICTORIA</div>
  <div id="result-subtitle"></div>
  <div id="result-reward"></div>
  <div class="result-buttons" id="result-buttons"></div>
</div>

<!-- THREE.JS & LOADERS -->

// ══════════════════════════════════════════
// THREE.JS SETUP
// ══════════════════════════════════════════
let scene, camera, renderer, animMixers = [], clock;

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0806);
  scene.fog = new THREE.FogExp2(0x0a0806, 0.06);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 6, 12);
  camera.lookAt(0, 1, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // Lights
  const ambient = new THREE.AmbientLight(0x3a2a18, 1.2);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffd090, 2.5);
  sun.position.set(5, 12, 8);
  sun.castShadow = true;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x2040a0, 0.6);
  fill.position.set(-6, 4, -8);
  scene.add(fill);
  const rim = new THREE.PointLight(0xff6000, 0.8, 20);
  rim.position.set(0, 3, -6);
  scene.add(rim);

  // Ground plane fallback
  const geo = new THREE.PlaneGeometry(30, 30);
  const mat = new THREE.MeshStandardMaterial({ color: 0x1a1208, roughness: 0.9, metalness: 0.1 });
  const ground = new THREE.Mesh(geo, mat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  clock = new THREE.Clock();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  animMixers.forEach(m => m.update(dt));
  renderer.render(scene, camera);
}

// ══════════════════════════════════════════
// FBX LOADER — real load with CORS fallback
// ══════════════════════════════════════════
function loadFBXScript(cb) {
  if (typeof THREE.FBXLoader !== 'undefined' || window.FBXLoader) { cb(); return; }
  let attempts = 0;
  const check = setInterval(() => {
    attempts++;
    if (typeof THREE.FBXLoader !== 'undefined' || window.FBXLoader) {
      clearInterval(check); cb();
    } else if (attempts > 20) {
      clearInterval(check); cb();
    }
  }, 100);
}

function getFBXLoader() {
  if (typeof THREE.FBXLoader !== 'undefined') return new THREE.FBXLoader();
  if (typeof FBXLoader !== 'undefined') return new FBXLoader();
  return null;
}

function loadCharMesh(charId, url) {
  return new Promise((resolve) => {
    const loader = getFBXLoader();
    if (!loader) { resolve(createPlaceholderMesh(charId)); return; }
    loader.load(url,
      (fbx) => {
        fbx.scale.setScalar(0.01);
        fbx.traverse(child => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
        fbx.userData.charId = charId;
        fbx.userData.idleOffset = Math.random() * Math.PI * 2;
        fbx.userData.baseY = 0;
        if (fbx.animations && fbx.animations.length > 0) {
          const mixer = new THREE.AnimationMixer(fbx);
          const action = mixer.clipAction(fbx.animations[0]);
          action.play();
          animMixers.push(mixer);
        }
        resolve(fbx);
      },
      undefined,
      (err) => {
        console.warn(`FBX no cargó para ${charId} (CORS/Drive), usando placeholder.`, err);
        resolve(createPlaceholderMesh(charId));
      }
    );
  });
}

function loadMapMesh(url) {
  return new Promise((resolve) => {
    const loader = getFBXLoader();
    if (!loader) { resolve(null); return; }
    loader.load(url,
      (fbx) => {
        fbx.scale.setScalar(0.01);
        fbx.traverse(child => { if (child.isMesh) child.receiveShadow = true; });
        resolve(fbx);
      },
      undefined,
      (err) => {
        console.warn('Mapa FBX no cargó (CORS/Drive), usando suelo placeholder.', err);
        resolve(null);
      }
    );
  });
}

// Placeholder character mesh (since FBX files need CORS-enabled hosting)
function createPlaceholderMesh(charId) {
  const data = CHAR_DATA[charId];
  const group = new THREE.Group();
  
  const isEnemy = data.team === 'enemy';
  const bodyColor = isEnemy ? 0x4a1a1a : (charId === 'hercules' ? 0x2a1a0a : (charId === 'orfeo' ? 0x1a1a3a : 0x1a2a1a));
  const accentColor = isEnemy ? 0xaa3333 : (charId === 'hercules' ? 0xc0830a : (charId === 'orfeo' ? 0x4040c0 : 0x40c040));

  // Body
  const bodyGeo = new THREE.CylinderGeometry(0.25, 0.2, 0.8, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.7 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.8;
  body.castShadow = true;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.22, 10, 10);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a875, roughness: 0.6 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.45;
  head.castShadow = true;
  group.add(head);

  // Weapon/accent
  const wGeo = new THREE.BoxGeometry(0.06, 0.9, 0.06);
  const wMat = new THREE.MeshStandardMaterial({ color: accentColor, metalness: 0.8, roughness: 0.2 });
  const weapon = new THREE.Mesh(wGeo, wMat);
  weapon.position.set(isEnemy ? -0.4 : 0.4, 0.9, 0);
  weapon.rotation.z = isEnemy ? 0.2 : -0.2;
  group.add(weapon);

  // Legs
  [-0.12, 0.12].forEach(x => {
    const lg = new THREE.CylinderGeometry(0.1, 0.09, 0.5, 6);
    const lm = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.8 });
    const leg = new THREE.Mesh(lg, lm);
    leg.position.set(x, 0.25, 0);
    leg.castShadow = true;
    group.add(leg);
  });

  // Name label (simple)
  group.userData.charId = charId;
  
  // Idle bob animation data
  group.userData.idleOffset = Math.random() * Math.PI * 2;
  group.userData.baseY = 0;

  return group;
}

// ══════════════════════════════════════════
// LOADING & INITIALIZATION
// ══════════════════════════════════════════
function setLoadProgress(pct, txt) {
  document.getElementById('loading-bar').style.width = pct + '%';
  document.getElementById('loading-text').textContent = txt;
}

async function initGame() {
  initThree();
  animate();

  setLoadProgress(5, 'Cargando motor 3D...');
  await delay(200);

  // Init character states
  Object.keys(CHAR_DATA).forEach(id => {
    state.characters[id] = initCharState(id);
  });

  // Wait for FBXLoader to be ready
  await new Promise(resolve => loadFBXScript(resolve));

  // ── Cargar mapa ──
  setLoadProgress(15, 'Cargando mapa de batalla...');
  const mapMesh = await loadMapMesh(MAP_URL);
  if (mapMesh) {
    mapMesh.position.set(0, 0, 0);
    scene.add(mapMesh);
    state.centralMesh = mapMesh;
  }

  // ── Cargar aliados ──
  setLoadProgress(30, 'Cargando aliados...');
  const allyIds = ['jason', 'orfeo', 'hercules'];
  for (let i = 0; i < allyIds.length; i++) {
    const id = allyIds[i];
    setLoadProgress(30 + i * 10, `Cargando ${CHAR_DATA[id].name}...`);
    const mesh = await loadCharMesh(id, CHAR_DATA[id].neutralUrl);
    const pos = SLOT_POSITIONS[CHAR_DATA[id].slot];
    mesh.position.set(pos.x, pos.y, pos.z);
    mesh.rotation.y = Math.PI * 0.1;
    scene.add(mesh);
    state.meshes[id] = mesh;
  }

  // ── Cargar enemigos ──
  setLoadProgress(62, 'Cargando enemigos...');
  const enemyIds = ['guard1', 'guard2', 'guard3'];
  for (let i = 0; i < enemyIds.length; i++) {
    const id = enemyIds[i];
    setLoadProgress(62 + i * 8, `Cargando ${CHAR_DATA[id].name}...`);
    const mesh = await loadCharMesh(id, CHAR_DATA[id].neutralUrl);
    const pos = SLOT_POSITIONS[CHAR_DATA[id].slot];
    mesh.position.set(pos.x, pos.y, pos.z);
    mesh.rotation.y = -Math.PI + 0.1;
    scene.add(mesh);
    state.meshes[id] = mesh;
  }

  setLoadProgress(90, 'Construyendo interfaz...');
  await delay(200);

  buildUI();
  initPendingTurns();

  setLoadProgress(100, '¡Que comience la batalla!');
  await delay(600);

  // Hide loading
  document.getElementById('loading-screen').style.opacity = '0';
  document.getElementById('loading-screen').style.transition = 'opacity 0.8s';
  await delay(800);
  document.getElementById('loading-screen').style.display = 'none';

  state.loaded = true;
  log('⚔ La batalla comienza — ¡Turno del Jugador!', 'info');
  updateHUD();

  // Start idle animations
  startIdleAnimations();
}

function startIdleAnimations() {
  let t = 0;
  function idleTick() {
    t += 0.016;
    Object.keys(state.meshes).forEach(id => {
      const mesh = state.meshes[id];
      if (!mesh || !state.characters[id].alive) return;
      const offset = mesh.userData.idleOffset || 0;
      mesh.position.y = mesh.userData.baseY + Math.sin(t * 1.5 + offset) * 0.04;
    });
    requestAnimationFrame(idleTick);
  }
  idleTick();
}

// ══════════════════════════════════════════
// UI BUILDING
// ══════════════════════════════════════════
function buildUI() {
  const allyPanel = document.getElementById('ally-panel');
  const enemyPanel = document.getElementById('enemy-panel');
  allyPanel.innerHTML = '';
  enemyPanel.innerHTML = '';

  ['jason', 'orfeo', 'hercules'].forEach(id => {
    allyPanel.appendChild(buildCharCard(id, 'ally'));
  });
  ['guard1', 'guard2', 'guard3'].forEach(id => {
    enemyPanel.appendChild(buildCharCard(id, 'enemy'));
  });
}

function buildCharCard(charId, side) {
  const c = state.characters[charId];
  const data = CHAR_DATA[charId];
  const div = document.createElement('div');
  div.className = 'char-card' + (side === 'enemy' ? ' enemy-card' : '');
  div.id = 'card-' + charId;

  const hpPct = Math.max(0, (c.hp / c.maxHp) * 100);
  const epPct = Math.max(0, (c.energy / c.maxEnergy) * 100);
  const hpClass = hpPct < 30 ? 'hp-bar low' : 'hp-bar';

  div.innerHTML = `
    <div class="char-name">${data.name}</div>
    <div class="bar-row">
      <div class="bar-label">HP ${c.hp}/${c.maxHp}</div>
      <div class="bar-bg"><div class="bar-fill ${hpClass}" style="width:${hpPct}%"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">EP ${c.energy}/${c.maxEnergy}</div>
      <div class="bar-bg"><div class="bar-fill ep-bar" style="width:${epPct}%"></div></div>
    </div>
    <div class="effects-row" id="effects-${charId}"></div>
    ${c.turnUsed && side === 'ally' ? '<div class="turn-used-overlay">Turno usado</div>' : ''}
  `;

  if (!c.alive) {
    div.classList.add('dead');
  } else if (side === 'ally') {
    if (c.turnUsed) div.classList.add('no-turn');
    div.addEventListener('click', () => onAllyClick(charId));
  }

  if (side === 'ally' && charId === state.selectedChar) div.classList.add('selected');

  updateEffectIcons(charId, div);
  return div;
}

function refreshCard(charId) {
  const old = document.getElementById('card-' + charId);
  if (!old) return;
  const side = CHAR_DATA[charId].team === 'ally' ? 'ally' : 'enemy';
  const newCard = buildCharCard(charId, side);
  old.replaceWith(newCard);
}

function updateEffectIcons(charId, container) {
  const c = state.characters[charId];
  const row = container ? container.querySelector('#effects-' + charId) : document.getElementById('effects-' + charId);
  if (!row) return;
  row.innerHTML = '';
  const EFFECT_ICONS = { stun:'😵', confuse:'😵‍💫', bleed:'🩸', prov:'🛡', immune:'💫', regen:'💚', defUp:'🔺', atkUp:'⚔', defDown:'🔻' };
  const EFFECT_COLORS = { stun:'#f39c12', confuse:'#9b59b6', bleed:'#e74c3c', prov:'#e67e22', immune:'#1abc9c', regen:'#2ecc71', defUp:'#3498db', atkUp:'#e74c3c', defDown:'#e74c3c' };
  c.effects.forEach(eff => {
    const div = document.createElement('div');
    div.className = 'effect-icon';
    div.style.background = (EFFECT_COLORS[eff.type] || '#555') + '33';
    div.style.borderColor = EFFECT_COLORS[eff.type] || '#555';
    div.innerHTML = `${EFFECT_ICONS[eff.type] || '?'}<span class="dur">${eff.duration}</span>`;
    div.title = eff.type;
    row.appendChild(div);
  });
}

function updateHUD() {
  document.getElementById('round-display').textContent = `RONDA ${state.round}`;
  document.getElementById('turn-display').textContent = state.phase === 'player' ? 'TURNO DEL JUGADOR' : 'TURNO ENEMIGO';
  ['jason','orfeo','hercules','guard1','guard2','guard3'].forEach(refreshCard);
  updateEffectIconsAll();
}

function updateEffectIconsAll() {
  Object.keys(state.characters).forEach(id => updateEffectIcons(id, null));
}

// ══════════════════════════════════════════
// ALLY CLICK
// ══════════════════════════════════════════
function onAllyClick(charId) {
  if (state.phase !== 'player') return;
  if (state.targetMode) return; // selecting target
  const c = state.characters[charId];
  if (!c.alive || c.turnUsed) return;

  state.selectedChar = charId;
  closeSkills();
  closeItem();

  document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('card-' + charId)?.classList.add('selected');
  document.getElementById('selected-char-name').textContent = CHAR_DATA[charId].name.toUpperCase();
  document.getElementById('main-buttons').style.display = 'flex';
}

function onEnemyClick(charId) {
  if (!state.targetMode) return;
  const { skill, caster, targetTeam } = state.targetMode;
  if (targetTeam !== 'enemy') return;
  const c = state.characters[charId];
  if (!c.alive) return;
  cancelTargetMode();
  executeSkill(caster, skill, charId);
}

function onAllyTargetClick(charId) {
  if (!state.targetMode) return;
  const { skill, caster, targetTeam } = state.targetMode;
  if (targetTeam !== 'ally') return;
  const c = state.characters[charId];
  if (!c.alive) return;
  cancelTargetMode();
  executeSkill(caster, skill, charId);
}

// ══════════════════════════════════════════
// SKILL PANEL
// ══════════════════════════════════════════
function openSkills() {
  if (!state.selectedChar) return;
  closeItem();
  const panel = document.getElementById('skill-panel');
  const grid = document.getElementById('skill-grid');
  grid.innerHTML = '';
  const charId = state.selectedChar;
  const c = state.characters[charId];
  const skills = CHAR_DATA[charId].skills;

  skills.forEach(sk => {
    const btn = document.createElement('button');
    btn.className = 'skill-btn' + (c.energy < sk.cost ? ' locked' : '');
    btn.innerHTML = `
      <div class="skill-icon">${sk.icon}</div>
      <div class="skill-info">
        <div class="skill-name">${sk.name}</div>
        <div class="skill-cost">⚡ ${sk.cost} energía</div>
        <div class="skill-desc">${sk.desc}</div>
      </div>
    `;
    if (c.energy >= sk.cost) {
      btn.addEventListener('click', () => onSkillSelect(charId, sk));
    }
    grid.appendChild(btn);
  });

  panel.classList.add('visible');
}

function closeSkills() {
  document.getElementById('skill-panel').classList.remove('visible');
}

function toggleItem() {
  closeSkills();
  const p = document.getElementById('item-panel');
  p.classList.toggle('visible');
}
function closeItem() {
  document.getElementById('item-panel').classList.remove('visible');
}

function onSkillSelect(charId, skill) {
  closeSkills();
  // Determine if needs target selection
  const needsEnemyTarget = skill.type === 'dmg_single' || skill.type === 'dmg_single_stun' || skill.type === 'dmg_single_debuff' || skill.type === 'dmg_single_effect';
  const needsAllyTarget = skill.type === 'heal_single';
  const isSelf = skill.type === 'taunt';
  const isArea = ['buff_area','dmg_area','dmg_area_heavy','dmg_area_dot','cleanse_area'].includes(skill.type);

  if (needsEnemyTarget) {
    enterTargetMode(charId, skill, 'enemy');
  } else if (needsAllyTarget) {
    enterTargetMode(charId, skill, 'ally');
  } else if (isSelf || isArea) {
    executeSkill(charId, skill, null);
  }
}

function enterTargetMode(caster, skill, targetTeam) {
  state.targetMode = { skill, caster, targetTeam };
  const banner = document.getElementById('target-banner');
  banner.textContent = targetTeam === 'enemy' ? '⚔ SELECCIONA UN ENEMIGO' : '💚 SELECCIONA UN ALIADO';
  banner.className = 'target-banner visible' + (targetTeam === 'ally' ? ' ally-mode' : '');
  banner.style.display = 'block';

  // Highlight targets
  if (targetTeam === 'enemy') {
    ['guard1','guard2','guard3'].forEach(id => {
      if (state.characters[id].alive) {
        document.getElementById('card-' + id)?.classList.add('targeted');
        // Check if provocation active
      }
    });
    // Re-wire enemy cards
    document.querySelectorAll('.enemy-card').forEach(card => {
      card.classList.add('targetable');
    });
  } else {
    ['jason','orfeo','hercules'].forEach(id => {
      if (state.characters[id].alive) {
        document.getElementById('card-' + id)?.classList.add('ally-targeted');
      }
    });
  }
}

function cancelTargetMode() {
  state.targetMode = null;
  document.getElementById('target-banner').style.display = 'none';
  document.querySelectorAll('.targeted,.ally-targeted,.targetable').forEach(el => {
    el.classList.remove('targeted','ally-targeted','targetable');
  });
}

// ══════════════════════════════════════════
// DEFEND
// ══════════════════════════════════════════
function doDefend() {
  if (!state.selectedChar || state.phase !== 'player') return;
  const charId = state.selectedChar;
  const c = state.characters[charId];
  if (c.turnUsed) return;

  c.defending = true;
  const doubleRegen = c.stats ? c.stats.regenEp * 2 : CHAR_DATA[charId].stats.regenEp * 2;
  c.energy = Math.min(c.maxEnergy, c.energy + CHAR_DATA[charId].stats.regenEp * 2);
  addEffect(charId, { type: 'defUp', duration: 1, value: 1.5 });
  c.turnUsed = true;
  state.selectedChar = null;
  closeSkills();
  closeItem();
  document.getElementById('selected-char-name').textContent = '';
  log(`🛡 ${CHAR_DATA[charId].name} se defiende`, 'buff');
  updateHUD();
  checkPlayerTurnEnd();
}

// ══════════════════════════════════════════
// SKILL EXECUTION
// ══════════════════════════════════════════
async function executeSkill(casterId, skill, targetId) {
  // Only block if player tries to execute during an ongoing animation
  if (state.phase === 'animating' && CHAR_DATA[casterId].team === 'ally') return;
  state.phase = 'animating';
  closeSkills();
  closeItem();

  const caster = state.characters[casterId];
  caster.energy -= skill.cost;

  log(`${CHAR_DATA[casterId].name} usa ${skill.name}`, 'info');

  // Show animation in central slot
  await playCentralAnimation(casterId, skill);

  // Apply skill effects
  const targets = resolveTargets(casterId, skill, targetId);

  targets.forEach(tid => {
    applySkillToTarget(casterId, skill, tid);
  });

  // Handle buff/special
  if (skill.type === 'buff_area') {
    ['jason','orfeo','hercules'].filter(id => state.characters[id].alive).forEach(id => {
      addEffect(id, { type: 'atkUp', duration: 2, value: 1.2 });
      addEffect(id, { type: 'defUp', duration: 2, value: 1.2 });
    });
    log(`⚔ Todo el equipo: Atk+20% Def+20% por 2 turnos`, 'buff');
  }
  if (skill.type === 'taunt') {
    addEffect(casterId, { type: 'prov', duration: 2, value: 1.3 });
    addEffect(casterId, { type: 'defUp', duration: 2, value: 1.3 });
    state.provocationTarget = casterId;
    log(`🏛 ${CHAR_DATA[casterId].name} provoca a los enemigos`, 'buff');
  }
  if (skill.type === 'cleanse_area') {
    ['jason','orfeo','hercules'].filter(id => state.characters[id].alive).forEach(id => {
      const c = state.characters[id];
      c.effects = c.effects.filter(e => !['stun','confuse','bleed','defDown'].includes(e.type));
      addEffect(id, { type: 'immune', duration: 1 });
    });
    log(`✨ Efectos negativos eliminados. Inmunidad al equipo`, 'buff');
  }

  caster.turnUsed = true;
  state.selectedChar = null;
  document.getElementById('selected-char-name').textContent = '';

  updateHUD();
  checkDeaths();

  if (CHAR_DATA[casterId].team === 'ally') {
    state.phase = 'player';
    checkPlayerTurnEnd();
  } else {
    state.phase = 'enemy';
    // AI continues
  }
}

function resolveTargets(casterId, skill, targetId) {
  if (skill.type === 'dmg_area' || skill.type === 'dmg_area_heavy' || skill.type === 'dmg_area_dot' || skill.type === 'buff_area' || skill.type === 'cleanse_area') {
    if (CHAR_DATA[casterId].team === 'enemy') return ['jason','orfeo','hercules'].filter(id => state.characters[id].alive);
    return ['guard1','guard2','guard3'].filter(id => state.characters[id].alive);
  }
  if (skill.type === 'taunt') return [];
  return targetId ? [targetId] : [];
}

function applySkillToTarget(casterId, skill, targetId) {
  const caster = state.characters[casterId];
  const target = state.characters[targetId];
  if (!target || !target.alive) return;

  const casterData = CHAR_DATA[casterId];

  // Compute raw atk with modifiers
  let atkVal = casterData.stats.atk;
  const atkMod = getEffectMult(casterId, 'atkUp');
  atkVal *= atkMod;

  // Compute def with modifiers
  let defVal = casterData.team !== CHAR_DATA[targetId].team ? CHAR_DATA[targetId].stats.def : 0;
  const targetDefMod = getEffectMult(targetId, 'defUp') * getEffectMult(targetId, 'defDown');
  defVal *= targetDefMod;
  if (target.defending) defVal *= 1.5;

  // Hit check
  const hitRoll = Math.random() * 100;
  const hitChance = casterData.stats.acc - CHAR_DATA[targetId].stats.eva;
  if (hitRoll > hitChance) {
    log(`${CHAR_DATA[casterId].name} FALLA contra ${CHAR_DATA[targetId].name}`, 'info');
    showFloatingText('FALLO', getCardCenter(targetId), 'miss');
    return;
  }

  // Immunity check
  const hasImmune = target.effects.some(e => e.type === 'immune');

  if (skill.type === 'heal_single') {
    const heal = skill.healAmt || 80;
    target.hp = Math.min(target.maxHp, target.hp + heal);
    if (!hasImmune) addEffect(targetId, { type: 'defUp', duration: 2, value: 1.15 });
    showFloatingText('+' + heal, getCardCenter(targetId), 'heal');
    log(`💚 ${CHAR_DATA[targetId].name} recupera ${heal} HP`, 'heal');
    return;
  }

  // Damage
  let baseDmg = Math.max(1, atkVal - defVal * 0.4);
  baseDmg *= (skill.dmgMult || 1.0);

  // Crit
  const critRoll = Math.random() * 100;
  const isCrit = skill.guaranteedCrit || critRoll <= casterData.stats.critChance;
  if (isCrit) baseDmg *= casterData.stats.critMult;
  baseDmg = Math.round(baseDmg);

  target.hp = Math.max(0, target.hp - baseDmg);
  showFloatingText(isCrit ? '💥 ' + baseDmg : '' + baseDmg, getCardCenter(targetId), isCrit ? 'crit' : 'dmg');
  log(`${isCrit ? '💥 CRÍTICO! ' : ''}${CHAR_DATA[casterId].name} → ${CHAR_DATA[targetId].name}: ${baseDmg} dmg`, isCrit ? 'crit' : 'dmg');

  // Side effects
  if (!hasImmune) {
    if (skill.type === 'dmg_single_stun' && Math.random() < 0.2) {
      addEffect(targetId, { type: 'stun', duration: 1 });
      log(`😵 ${CHAR_DATA[targetId].name} queda Aturdido`, 'info');
    }
    if (skill.type === 'dmg_single_debuff') {
      addEffect(targetId, { type: 'defDown', duration: 2, value: 0.5 });
      log(`🔻 Defensa de ${CHAR_DATA[targetId].name} reducida 50%`, 'info');
    }
    if (skill.type === 'dmg_single_effect') {
      addEffect(targetId, { type: 'confuse', duration: 2 });
      log(`😵‍💫 ${CHAR_DATA[targetId].name} queda Confundido`, 'info');
    }
    if (skill.type === 'dmg_area_dot') {
      addEffect(targetId, { type: 'bleed', duration: 3 });
      log(`🩸 ${CHAR_DATA[targetId].name} sangra`, 'dmg');
    }
  }

  if (target.hp <= 0) {
    killCharacter(targetId);
  }
}

function getEffectMult(charId, effectType) {
  const c = state.characters[charId];
  let mult = 1.0;
  c.effects.filter(e => e.type === effectType).forEach(e => { if (e.value) mult *= e.value; });
  return mult;
}

function addEffect(charId, eff) {
  const c = state.characters[charId];
  // Check immunity
  const negativeEffects = ['stun','confuse','bleed','defDown'];
  if (negativeEffects.includes(eff.type) && c.effects.some(e => e.type === 'immune')) return;
  c.effects.push({ ...eff });
}

function processEffects(charId) {
  const c = state.characters[charId];
  if (!c.alive) return;
  let skipTurn = false;
  const toRemove = [];

  c.effects.forEach((eff, i) => {
    if (eff.type === 'bleed') {
      const dmg = 25;
      c.hp = Math.max(0, c.hp - dmg);
      showFloatingText('🩸 ' + dmg, getCardCenter(charId), 'dmg');
      log(`🩸 ${CHAR_DATA[charId].name} pierde ${dmg} HP por Sangrado`, 'dmg');
      if (c.hp <= 0) killCharacter(charId);
    }
    if (eff.type === 'regen') {
      const h = 35;
      c.hp = Math.min(c.maxHp, c.hp + h);
      log(`💚 ${CHAR_DATA[charId].name} regenera ${h} HP`, 'heal');
    }
    if (eff.type === 'stun') {
      skipTurn = true;
      log(`😵 ${CHAR_DATA[charId].name} está Aturdido y pierde su turno`, 'info');
    }
    eff.duration--;
    if (eff.duration <= 0) toRemove.push(i);
  });

  // Remove expired
  c.effects = c.effects.filter((_, i) => !toRemove.includes(i));

  // Handle confusion separately (returns skip flag)
  const confuseEff = c.effects.find(e => e.type === 'confuse');
  if (confuseEff && Math.random() < 0.5) {
    skipTurn = true;
    log(`😵‍💫 ${CHAR_DATA[charId].name} está Confundido y pierde su turno`, 'info');
  }

  return skipTurn;
}

// ══════════════════════════════════════════
// CENTRAL ANIMATION
// Aliados  → carga el FBX de la skill en Plano central, lo reproduce y lo retira
// Enemigos → mueve su mesh a Plano central, espera y lo devuelve a su slot
// ══════════════════════════════════════════
function clearCentralSkillMesh() {
  if (state.centralSkillMesh) {
    scene.remove(state.centralSkillMesh);
    state.centralSkillMesh = null;
  }
  if (state.centralSkillMixer) {
    const idx = animMixers.indexOf(state.centralSkillMixer);
    if (idx > -1) animMixers.splice(idx, 1);
    state.centralSkillMixer = null;
  }
}

async function playCentralAnimation(casterId, skill) {
  const centralPos = SLOT_POSITIONS['Plano central'];
  const isEnemy = CHAR_DATA[casterId].team === 'enemy';

  // ── Guardia: avanza al centro, golpea, retrocede ──
  if (isEnemy) {
    const mesh = state.meshes[casterId];
    if (!mesh) { await delay(1000); return; }
    const origX = mesh.position.x;
    const origZ = mesh.position.z;
    // Avanzar al Plano central
    mesh.position.set(centralPos.x, 0, centralPos.z);
    await delay(1200);
    // Volver a su slot
    mesh.position.set(origX, 0, origZ);
    await delay(400);
    return;
  }

  // ── Aliado: carga el FBX de la habilidad en Plano central ──
  clearCentralSkillMesh();

  const loader = getFBXLoader();
  if (!loader || !skill.url) { await delay(800); return; }

  return new Promise((resolve) => {
    loader.load(
      skill.url,
      (fbx) => {
        fbx.scale.setScalar(0.01);
        fbx.traverse(child => {
          if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
        });
        fbx.position.set(centralPos.x, centralPos.y, centralPos.z);
        fbx.rotation.y = -Math.PI * 0.1; // mira ligeramente hacia los enemigos
        scene.add(fbx);
        state.centralSkillMesh = fbx;

        let duration = 1500;

        if (fbx.animations && fbx.animations.length > 0) {
          const mixer = new THREE.AnimationMixer(fbx);
          const clip  = fbx.animations[0];
          const action = mixer.clipAction(clip);
          action.setLoop(THREE.LoopOnce);
          action.clampWhenFinished = true;
          action.play();
          animMixers.push(mixer);
          state.centralSkillMixer = mixer;

          // Duración real del clip + pequeño buffer, tope de 4 s
          duration = Math.min(Math.max(clip.duration * 1000 + 300, 800), 4000);
        }

        setTimeout(() => {
          clearCentralSkillMesh();
          resolve();
        }, duration);
      },
      undefined,
      (err) => {
        console.warn(`Animación de skill no cargó (${skill.id}):`, err);
        resolve();
      }
    );
  });
}

// ══════════════════════════════════════════
// DEATH
// ══════════════════════════════════════════
function killCharacter(charId) {
  const c = state.characters[charId];
  c.alive = false;
  c.hp = 0;
  log(`💀 ${CHAR_DATA[charId].name} ha caído`, 'dmg');
  const mesh = state.meshes[charId];
  if (mesh) {
    // Fade out
    mesh.traverse(child => {
      if (child.isMesh) {
        child.material.transparent = true;
        child.material.opacity = 0.2;
      }
    });
    mesh.position.y -= 0.4;
  }
}

function checkDeaths() {
  const alliesAlive = ['jason','orfeo','hercules'].some(id => state.characters[id].alive);
  const enemiesAlive = ['guard1','guard2','guard3'].some(id => state.characters[id].alive);
  if (!alliesAlive) { showResult('defeat'); return; }
  if (!enemiesAlive) { showResult('victory'); return; }
}

// ══════════════════════════════════════════
// TURN MANAGEMENT
// ══════════════════════════════════════════
function initPendingTurns() {
  state.pendingTurns.ally = ['jason','orfeo','hercules'].filter(id => state.characters[id].alive);
  state.pendingTurns.enemy = ['guard1','guard2','guard3'].filter(id => state.characters[id].alive);
}

function checkPlayerTurnEnd() {
  const aliveAllies = ['jason','orfeo','hercules'].filter(id => state.characters[id].alive);
  const allUsed = aliveAllies.every(id => state.characters[id].turnUsed);
  if (allUsed) {
    setTimeout(startEnemyPhase, 700);
  }
}

async function startEnemyPhase() {
  state.phase = 'enemy';
  document.getElementById('enemy-turn-indicator').classList.add('visible');
  document.getElementById('ai-thinking').classList.add('visible');
  updateHUD();
  await delay(1000);

  const enemies = ['guard1','guard2','guard3'].filter(id => state.characters[id].alive);
  for (const eId of enemies) {
    await delay(600);
    await doEnemyTurn(eId);
    checkDeaths();
    const alliesAlive = ['jason','orfeo','hercules'].some(id => state.characters[id].alive);
    if (!alliesAlive) return;
  }

  document.getElementById('enemy-turn-indicator').classList.remove('visible');
  document.getElementById('ai-thinking').classList.remove('visible');

  startNewRound();
}

async function doEnemyTurn(enemyId) {
  const c = state.characters[enemyId];
  const skip = processEffects(enemyId);
  updateHUD();
  if (!c.alive) return;
  if (skip) {
    showEffectNotice(`${CHAR_DATA[enemyId].name} pierde su turno`);
    await delay(800);
    return;
  }

  const skills = CHAR_DATA[enemyId].skills.filter(sk => c.energy >= sk.cost);
  if (!skills.length) {
    log(`${CHAR_DATA[enemyId].name} no tiene energía`, 'info');
    return;
  }

  const skill = skills[Math.floor(Math.random() * skills.length)];
  
  // Determine target (respect provocation)
  let targetId = null;
  const aliveAllies = ['jason','orfeo','hercules'].filter(id => state.characters[id].alive);
  if (state.provocationTarget && state.characters[state.provocationTarget]?.alive) {
    targetId = state.provocationTarget;
  } else if (skill.type === 'dmg_single' || skill.type === 'dmg_single_stun') {
    targetId = aliveAllies[Math.floor(Math.random() * aliveAllies.length)];
  }

  await executeSkill(enemyId, skill, targetId);
  state.phase = 'enemy';
}

function startNewRound() {
  state.round++;
  state.phase = 'player';
  log(`── Ronda ${state.round} ──`, 'info');

  // Process ally effects & regen
  ['jason','orfeo','hercules'].forEach(id => {
    const c = state.characters[id];
    if (!c.alive) return;
    processEffects(id);
    const regen = CHAR_DATA[id].stats.regenEp;
    c.energy = Math.min(c.maxEnergy, c.energy + regen);
    c.turnUsed = false;
    c.defending = false;
  });

  // Process enemy effects & regen
  ['guard1','guard2','guard3'].forEach(id => {
    const c = state.characters[id];
    if (!c.alive) return;
    const regen = CHAR_DATA[id].stats.regenEp;
    c.energy = Math.min(c.maxEnergy, c.energy + regen);
    c.turnUsed = false;
    c.defending = false;
  });

  // Check provocation expiry
  if (state.provocationTarget) {
    const c = state.characters[state.provocationTarget];
    if (!c || !c.alive || !c.effects.some(e => e.type === 'prov')) {
      state.provocationTarget = null;
    }
  }

  updateHUD();
}

// ══════════════════════════════════════════
// RESULT SCREEN
// ══════════════════════════════════════════
function showResult(type) {
  state.phase = 'result';
  const screen = document.getElementById('result-screen');
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-subtitle');
  const reward = document.getElementById('result-reward');
  const btns = document.getElementById('result-buttons');
  btns.innerHTML = '';

  if (type === 'victory') {
    title.textContent = '⚔ VICTORIA ⚔';
    title.className = 'victory';
    sub.textContent = 'Los Argonautas han triunfado sobre los Guardias Reales';
    const coins = Math.floor(Math.random() * 40) + 30;
    reward.textContent = `+ ${coins} Monedas de Plata`;

    const btn = document.createElement('button');
    btn.className = 'result-btn';
    btn.textContent = 'Continuar';
    btn.onclick = () => location.reload();
    btns.appendChild(btn);
  } else {
    title.textContent = '☠ DERROTA ☠';
    title.className = 'defeat';
    sub.textContent = 'Los Argonautas han caído en batalla...';
    reward.textContent = '';

    const btn1 = document.createElement('button');
    btn1.className = 'result-btn';
    btn1.textContent = '↺ Reintentar';
    btn1.onclick = () => location.reload();
    btns.appendChild(btn1);

    const btn2 = document.createElement('button');
    btn2.className = 'result-btn secondary';
    btn2.textContent = '⌂ Menú Principal';
    btn2.onclick = () => location.reload();
    btns.appendChild(btn2);
  }

  screen.classList.add('visible');
}

// ══════════════════════════════════════════
// FLOATING TEXT
// ══════════════════════════════════════════
function showFloatingText(text, pos, type) {
  const div = document.createElement('div');
  div.className = 'float-dmg ' + type;
  div.textContent = text;
  div.style.left = (pos.x + Math.random() * 30 - 15) + 'px';
  div.style.top = (pos.y - 20) + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1300);
}

function getCardCenter(charId) {
  const card = document.getElementById('card-' + charId);
  if (!card) return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  const rect = card.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

// ══════════════════════════════════════════
// BATTLE LOG
// ══════════════════════════════════════════
function log(msg, type = 'info') {
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = msg;
  const logEl = document.getElementById('battle-log');
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
  // Keep max 30 entries
  while (logEl.children.length > 30) logEl.removeChild(logEl.firstChild);
}

// ══════════════════════════════════════════
// EFFECT NOTICE
// ══════════════════════════════════════════
function showEffectNotice(msg) {
  const el = document.getElementById('effect-notice');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1200);
}

// ══════════════════════════════════════════
// CARD CLICK ROUTING (enemy cards)
// ══════════════════════════════════════════
function setupCardClicks() {
  // Enemy cards
  ['guard1','guard2','guard3'].forEach(id => {
    document.getElementById('card-' + id)?.addEventListener('click', () => {
      if (state.targetMode?.targetTeam === 'enemy') onEnemyClick(id);
    });
  });
  // Ally cards as targets
  ['jason','orfeo','hercules'].forEach(id => {
    document.getElementById('card-' + id)?.addEventListener('click', () => {
      if (state.targetMode?.targetTeam === 'ally') onAllyTargetClick(id);
    });
  });
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('load', async () => {
  await initGame();
  setupCardClicks();
});

// Patch: re-setup card clicks on UI rebuild
const origBuildUI = buildUI;
window.buildUI = function() {
  origBuildUI();
  // Small delay to let DOM update
  requestAnimationFrame(() => {
    // Enemy target clicks
    ['guard1','guard2','guard3'].forEach(id => {
      const card = document.getElementById('card-' + id);
      if (card) {
        card.onclick = () => {
          if (state.targetMode?.targetTeam === 'enemy') onEnemyClick(id);
        };
      }
    });
    // Ally target clicks
    ['jason','orfeo','hercules'].forEach(id => {
      const card = document.getElementById('card-' + id);
      if (card) {
        // Already has click handler for selection, add target handler
        const orig = card.onclick;
        card.onclick = (e) => {
          if (state.targetMode?.targetTeam === 'ally') {
            onAllyTargetClick(id);
          } else {
            onAllyClick(id);
          }
        };
      }
    });
  });
};

// Override refreshCard to maintain click handlers
const origRefreshCard = refreshCard;
window.refreshCard = function(charId) {
  origRefreshCard(charId);
  requestAnimationFrame(() => {
    const card = document.getElementById('card-' + charId);
    if (!card) return;
    const isEnemy = CHAR_DATA[charId].team === 'enemy';
    card.onclick = () => {
      if (isEnemy) {
        if (state.targetMode?.targetTeam === 'enemy') onEnemyClick(charId);
      } else {
        if (state.targetMode?.targetTeam === 'ally') {
          onAllyTargetClick(charId);
        } else {
          onAllyClick(charId);
        }
      }
    };
  });
};
</script>
